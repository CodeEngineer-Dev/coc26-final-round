// since setInterval is so slow, this replaces Date.now and someother nasty stuff to make a nice reusable group of functions. I recieved a lot of help from the internet making this, and by no means is it the best implementation, but it does the trick
(() => {
    /** 
        Created by Arrow
        https://www.khanacademy.org/profile/Arrow.programming
    **/
    //performance.now() is faster than Date.now()
    if (typeof performance === 'undefined' || !performance.now) {
        //fallback
        globalThis.performance = globalThis.performance || { 
            now: () => Date.now() 
        };
    }
    
      //MessageChannel microtask-style scheduler for near-zero delays (faster than setTimeout(0))
    const mc = typeof MessageChannel !== 'undefined' ? new MessageChannel() : null;
    const _immediateQueue = new Map();
    let _immediateId = 1;
    if (mc) {
        mc.port1.onmessage = (e) => {
            const id = e.data;
            const fn = _immediateQueue.get(id);
            if (fn) {
                _immediateQueue.delete(id);
                try { 
                    fn(); 
                } catch (err) { 
                    setTimeout(() => { 
                        throw err; 
                    }, 0); 
                }
            }
        };
    }
    function postImmediate(fn) {
        if (!mc) {
            //no MessageChannel available fallback
            return setTimeout(fn, 0);
        }
        const id = _immediateId++;
        _immediateQueue.set(id, fn);
        mc.port2.postMessage(id);
        return id;
    }
    
    //internal registry so we can clear by id like clearInterval
    const timers = new Map();
    let nextTimerId = 1;
    
    //setFastInterval: returns numeric id (like setInterval). Use clearFastInterval(id) to stop.
    function setFastInterval(fn, intervalMs, options = {}) {
        if (typeof fn !== 'function'){ 
            throw new TypeError('callback must be a function');
        }
        intervalMs = Number(intervalMs) || 0;
        
        const id = nextTimerId++;
        let expected = performance.now() + intervalMs;
        let stopped = false;
        let pendingHandle = null;
        
        //not the best implementation, but oh well lol
        function scheduleNext(delay) {
            if (stopped){ 
                return;
            }
            if (delay <= 1) {
                //near-zero delay 
                pendingHandle = postImmediate(step);
                timers.set(id, { stop: () => { 
                    /* cannot cancel MessageChannel post; leave fn guard */ 
                    
                } });
            } 
            else {
                pendingHandle = setTimeout(step, delay);
                timers.set(id, { 
                    stop: () => clearTimeout(pendingHandle) 
                });
            }
        }
    
        function step() {
            if (stopped) {
                return;
            }
            
            const now = performance.now();
            const drift = now - expected;
            
            //run callback again :P
            try { 
                fn(); 
            } 
            catch (err) {
                //Don't break the timer on user errors lol
                setTimeout(() => { throw err; }, 0);
            }
            
            //compute next expected time and the delay to schedule
            expected += intervalMs;
            
            //If the drift is huge (like tab is suspended in chrome or edge i think edge has that?), skip missed intervals by catching up
            if (drift > intervalMs * 5) {
                //If drift is extremely large, reset expected to now + interval to avoid long backlog loops
                expected = now + intervalMs;
            }
            
            const nextDelay = Math.max(0, intervalMs - Math.max(0, drift));
            scheduleNext(nextDelay);
        }
            
        //intiaite
        scheduleNext(intervalMs);
            
        timers.set(id, {
            stop: () => {
                stopped = true;
            
                //cleanup for pending handle if it's a timeout
                try { 
                    clearTimeout(pendingHandle); 
                } catch (_) {}
            
                _immediateQueue.forEach((fn, k) => {
                    if (fn === step) { 
                        _immediateQueue.delete(k);
                    }
                });
                
                timers.delete(id);
            }
        });
            
        return id;
    }
    
    function clearFastInterval(id) {
        const t = timers.get(id);
        if (!t) {
            return; 
        }
        t.stop();
    }
        
    //make this global
    if (typeof globalThis !== 'undefined') {
        globalThis.setFastInterval = setFastInterval;
        globalThis.clearFastInterval = clearFastInterval;
    } 
    else if (typeof window !== 'undefined') {
        window.setFastInterval = setFastInterval;
        window.clearFastInterval = clearFastInterval;
    } 
    else if (typeof self !== 'undefined') {
        self.setFastInterval = setFastInterval;
        self.clearFastInterval = clearFastInterval;
    } 
    else {
        //and export!
        try { 
            module.exports = { 
                setFastInterval, 
                clearFastInterval 
            }; 
        } catch (_) {}
    }

    
})();

//fetch a certain part of the screen and move it around in chunks
class Explosion {
    /** 
        Created by Arrow
        https://www.khanacademy.org/profile/Arrow.programming
    **/
    constructor(x, y, w, h, parSize) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
        this.parSize = parSize;
        
        this.ImgArr = [];
        this.array = this.getImgs();
    }
    runParticles(par){
        for(let i = 0; i < par.length; i++){
            ctx.save();
                ctx.translate(par[i].x, par[i].y);
                ctx.translate(-this.parSize/2, 0);
                //put image particles cannot be transparent, going to have to fix this later by adding a seperate canvas
                //ctx.globalAlpha = par[i].opacity;
                //ctx.globalAlpha = 0.1;
                //image(par[i].i, 0, 0);
                ctx.putImageData(par[i].i, par[i].x, par[i].y, 0, 0, this.parSize, this.parSize);
            ctx.restore();
            par[i].opacity -= par[i].timer/2000;
            //err = par[i].opacity;
            par[i].y += par[i].vy * dt;
            par[i].x += par[i].vx * dt;
            //acceleration 
            par[i].vx -= 0.08 * dt; 
            par[i].timer--;
            if(par[i].timer < 0){
                par.splice(i, 1);
            }
        }
    }
    getImgs(){
        for(var i = this.x; i < this.x + this.w; i += this.parSize){
            for(var j = this.y; j < this.y + this.h; j += this.parSize){
                this.ImgArr.push({
                    //fetch a chunks of the image
                    i: ctx.getImageData(i, j, this.parSize, this.parSize),
                    //velocity is random
                    vx: -random(0.005, 0.1) * 60, 
                    vy: -random(1.005, 1.0) * 60, 
                    //rotation
                    r: 60, 
                    rs: random(-2, 2) * 60, 
                    //particle speed
                    s: random(20, 25), 
                    //starting place
                    x: i, 
                    y: j,   
                    timer: random(20, 100),
                    opacity: 1,
                });
            }
        }
        return this.ImgArr;
    }
    run(){
        this.runParticles(this.array);
    }
};

//implements a randomized value on a bell curve to give a random normal distribution
function gaussianRandom() {
    //sample size is a implementation of the Central Limit Theroem
    var sampSize = 7;
    var rand = 0;
    for (var i = 0; i < sampSize; i += 1) {
        rand += Math.random();
    }
    return rand / sampSize;
}
function normRandom(start, end) {
  return Math.floor(start + gaussianRandom() * (end - start + 1));
}

//minimap configuration
const minimap = {
    //position
    x: 370,
    y: 80,
    
    //sizing
    scale: 0.5,      
    blockSize: 10,
    
    //colors
    blockColor: 'rgb(45, 45, 45)',
    roomBgColor: 'rgba(0, 0, 0, 0.3)',
    currentRoomOutlineColor: 'red',
    otherRoomOutlineColor: 'blue',
    playerIndicatorColor: 'green',
    
    //pre-calculate room dimensions and positions
    roomDimensions: {},
    worldLayout: {},
    
    init: function() {
        
        //calculate dimensions for each room template
        for (const [key, roomData] of Object.entries(roomTemplates)) {
            const height = roomData.length;
            const width = Math.max(...roomData.map(row => row. length));
            this.roomDimensions[key] = { width, height };
        }
        
        //calculate positions of each room in the world grid
        let currentY = 0;
        for (let row = 0; row < worldAssembly.length; row++) {
            let currentX = 0;
            let maxRowHeight = 0;
            
            for (let col = 0; col < worldAssembly[row].length; col++) {
                const roomKey = worldAssembly[row][col];
                if (roomKey) {
                    const dims = this.roomDimensions[roomKey];
                    this.worldLayout[`${row},${col}`] = {
                        key: roomKey,
                        x: currentX,
                        y: currentY,
                        width: dims. width,
                        height: dims.height
                    };
                    
                    // currentX += dims.width * this.blockSize;
                    // maxRowHeight = Math.max(maxRowHeight, dims.height * this.blockSize);
                    currentX += dims.width;
maxRowHeight = Math.max(maxRowHeight, dims.height);
                }
            }
            currentY += maxRowHeight;
        }
    },
    
    draw: function(playerRow, playerCol, playerX, playerY) {
        ctx.save();
        
        //draw background for minimap
        ctx.fillStyle = this.roomBgColor;
        ctx.fillRect(this.x, this.y, 200, 200);
        
        //draw all rooms
        for (const [key, roomInfo] of Object.entries(this.worldLayout)) {
            const [row, col] = key.split(',').map(Number);
            
            //dimnsioning
            const roomX = this.x + (roomInfo.x * this.blockSize * this.scale);
            const roomY = this.y + (roomInfo.y * this.blockSize * this.scale);
            const roomW = roomInfo.width * this.blockSize * this.scale;
            const roomH = roomInfo.height * this.blockSize * this.scale;
            
            //draw blocks in this room
            const roomTemplate = roomTemplates[roomInfo.key];
            for (let y = 0; y < roomTemplate.length; y++) {
                for (let x = 0; x < roomTemplate[y].length; x++) {
                    if (roomTemplate[y][x] === '#') {
                        const blockX = this.x + ((roomInfo.x + x) * this.blockSize * this.scale);
                        const blockY = this.y + ((roomInfo.y + y) * this.blockSize * this.scale);
                        const blockSize = this.blockSize * this. scale;
                        
                        ctx.fillStyle = this.blockColor;
                        ctx.fillRect(blockX, blockY, blockSize, blockSize);
                    }
                }
            }
            
            //draw room outline
            ctx.lineWidth = 2;
            if (row === playerRow && col === playerCol) {
                ctx.strokeStyle = this.currentRoomOutlineColor;
            } 
            else {
                ctx.strokeStyle = this.otherRoomOutlineColor;
            }
            ctx.strokeRect(roomX, roomY, roomW, roomH);
        }
        
        //draw player indicator
        const playerRoomInfo = this.worldLayout[`${playerRow},${playerCol}`];
        if (playerRoomInfo) {
            //player coords
            const mapPlayerX = this.x + ((playerRoomInfo.x * this. blockSize + playerX) * this.scale);
            const mapPlayerY = this.y + ((playerRoomInfo.y * this.blockSize + playerY) * this.scale);

            ctx.fillStyle = this.playerIndicatorColor;
            //ctx.beginPath();
            ctx.fillRect(mapPlayerX, mapPlayerY, this.blockSize * this.scale, this.blockSize * this.scale * 2);
            //ctx.fill();
        }
        
        ctx.restore();
    }
};

//defines a rectangular area with functions to calculate boundaries from two points
class Bounds {
    //creates a Bounds instance by determining top-left origin and dimensions from any two corners
    static fromCorners(x1, y1, x2, y2) {
        const x = Math.min(x1, x2);
        const y = Math.min(y1, y2);
        const width = Math.abs(x1 - x2);
        const height = Math.abs(y1 - y2);
        return new Bounds(x, y, width, height);
    }

    //horizontal and vertical origin
    x = 0;
    y = 0;

    width = 0;
    height = 0;


    constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
    }

    //right edge coordinate
    get maxX() {
        return this.x + this.width;
    }

    //bottom edge coordinate
    get maxY() {
        return this.y + this.height;
    }
}

//coordinate conversions between world space and a fixed-size grid system
class Grid {
    //default pixel size of a single grid cell
    size = 40;


    setSize(value) {
        this.size = value;
    }

    //converts cell index to pixel coordinate and vice-versa
    cellToWorld(x) {
        return x * this.size;
    }
    worldToCell(x) {
        return Math.floor(x / this.size);
    }

    //calculates which grid cell indices are covered by a specific world-space bounds object
    getIndicesFromBounds(bounds) {
        return Bounds.fromCorners(
            Math.floor(bounds.x / this.size),
            Math.floor(bounds.y / this.size),
            Math.ceil(bounds.maxX / this.size),
            Math.ceil(bounds.maxY / this.size)
        );
    }

    //generator that iterates through every cell coordinate within the provided bounds
    * visitCells(bounds) {
        const indexBounds = this.getIndicesFromBounds(bounds);
        for (let x = indexBounds.x; x < indexBounds.maxX; x++) {
            for (let y = indexBounds.y; y < indexBounds.maxY; y++) {
                yield {
                    x,
                    y
                };
            }
        }
    }

}



//A 2D data structure for storing and retrieving values (like characters or light levels) at coordinates
class Raster {
    //nested array representing rows and columns
    data = [];

    set(x, y, value) {
        if (!this.data[y]) {
            this.data[y] = [];
        }
        this.data[y][x] = value;
    }

    //retrieves value or returns null if undefined
    get(x, y) {
        return this.data[y]?.[x] ?? null;
    }

    //resets entire data set
    clear() {
        this.data.length = 0;
    }


    //static factory that converts strings or 2D arrays into a populated Raster instance
    static fromBitmap(bitmap, converter = null) {
        const raster = new Raster();
        if (typeof bitmap === "string") {
            bitmap = bitmap.split("\n");
        }
        bitmap.forEach((row, y) => {
            if (typeof row === "string") {
                row = row.split("");
            }
            row.forEach((symbol, x) => {
                if (converter) {
                    raster.set(x, y, converter(x, y, symbol));
                } else {
                    raster.set(x, y, symbol);
                }
            });
        });
        return raster;
    }
}


    
//map lighting



let grid = null;
let levelArray = null;
let camera = null;
let lighting = null;
//calculates light propagation across a grid based on cell types and decay settings
class Lighting {
    //stores calculated light intensity per cell
    data = new Raster();

    constructor(grid, palette, settings) {
        //reference to the grid scale
        this.grid = grid;
        //mapping of symbols to properties like solidity and emission
        this.palette = palette;
        //configuration for light decay and minimum levels
        this.settings = settings;
    }

    // Checks if a cell blocks light
    isSolid(symbol) {
        return !!(this.palette[symbol]?.isSolid);
    }

    // Gets base brightness of a cell
    getEmission(symbol) {
        return this.palette[symbol]?.emission ?? 0;
    }

    // Calculates a cell's light level by diffusing light from neighbors and applying decay
    getLightLevel(x, y, symbol) {
        const left = this.data.get(x - 1, y);
        const right = this.data.get(x + 1, y);
        const top = this.data.get(x, y - 1);
        const bottom = this.data.get(x, y + 1);

        const highestNeighbor = Math.max(left, right, top, bottom);
        // Apply different decay rates depending on whether the light is passing through a solid or air
        const lightLevel = Math.max(highestNeighbor * (this.isSolid(symbol) ? this.settings.groundDecay : this.settings.airDecay), this.settings.minLevel);
        const emission = this.getEmission(symbol);
        // If cell emits its own light, use that; otherwise, use calculated diffused light
        if (emission > lightLevel) {
            //
            this.data.set(x, y, emission);
            return emission;
        } else {
            this.data.set(x, y, lightLevel);
            return highestNeighbor; // Do not return the actual calculated light level for the cell. Instead return the highest neighbor, which allows solid blocks adjacent to air to be lit
        }
    }

}


function updateAndRenderLighting(lighting) {
    for (let { x, y } of lighting.grid.visitCells(camera)) {
        const symbol = levelArray.get(x, y);
        ctx.fillStyle = `rgba(1, 1, 1, ${ 1- lighting.getLightLevel(x, y, symbol)})`;
        
        ctx.fillRect(lighting.grid.cellToWorld(x), lighting.grid.cellToWorld(y), lighting.grid.size, lighting.grid.size);
    }
}

//auto tiling, orientation, edge checks. 
const tiled = {
    /**
     * Created by Arrow (@Arrow.programming)
     * January, 2025
     * 
    **/
    left: function(MAP, row, col, char, char2){
        //if(MAP[row][col] === char){
            if(MAP[row][col - 1] === char){
                return true;
            } 
        //}
    },
    right: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(MAP[row][col + 1] === char){
                return true;
            }
        //}
    },
    bottom: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(row < MAP.length - 1){
                if(MAP[row + 1][col] === char){
                    return true;
                }
            }
        //}
    },
    top: function(MAP, row, col, char){
        //if(MAP[row][col] === char){
            if(row > 0){
                if(MAP[row - 1][col] === char){
                    return true;
                }
            }
        //}
    },
    isOnEdge: function(array, row, col) {
        const numRows = array.length;
        const numCols = array[0].length;
        return row === 0 || row === numRows - 1 || col === 0 || col === numCols - 1;
    },
    findEdges: function(matrix) {
        if (!matrix.length) return [];
    
        const edges = [];
        const rows = matrix.length;
        const cols = matrix[0].length;
    
        //top row
        for (let col = 0; col < cols; col++) {
            edges.push(matrix[0][col]);
        }
    
        //right column (excluding the top and bottom corners)
        for (let row = 1; row < rows - 1; row++) {
            edges.push(matrix[row][cols - 1]);
        }
    
        //bottom row (if there's more than one row)
        if (rows > 1) {
            for (let col = cols - 1; col >= 0; col--) { 
                edges.push(matrix[rows - 1][col]);
            }
        }
    
        //left column (excluding the top and bottom corners)
        for (let row = rows - 2; row > 0; row--) {
            edges.push(matrix[row][0]);
        }
    
        return edges;
    }
};

Debug.prototype.initParticleStatsRun = function(){

        let a = 0;
        for (let i = 0; i < particleSystems.length; i++) {
            const sys = particleSystems[i];
            if (!sys) continue;
            a += (sys.particles ? sys.particles.length : 0);
            a += (sys.foreverParticles ? sys.foreverParticles.length : 0);
        }
        this.activeParticles = a;
        this.freePool = (particlePool && Array.isArray(particlePool.pool)) ? particlePool.pool.length : 0;

//convert screen pixels to world pixels
function screenToWorld(cssX, cssY) {
    const worldX_preCam = cssX / displayScale;
    const worldY_preCam = cssY / displayScale;
    const worldX = worldX_preCam / cam.z + cam.x - cam.align.x - (shake.x || 0);
    const worldY = worldY_preCam / cam.z + cam.y - cam.align.y - (shake.y || 0);
    return { 
        x: worldX, 
        y: worldY
    };
}
function worldToScreen(worldX, worldY) {
    //calculate the total scale used in your camera
    const totalScale = cam.z * dprVal * displayScale;

    //undo the camera translation (this.x, align, shake) 
    //and then apply the total scale
    const screenX = (worldX - cam.x + cam.align.x + (shake.x || 0)) * totalScale;
    const screenY = (worldY - cam.y + cam.align.y + (shake.y || 0)) * totalScale;

    return { 
        x: screenX, 
        y: screenY 
    };
}


window.addEventListener('mousemove', (e) => {
  mouse.screenX = e.clientX;
  mouse.screenY = e.clientY;

  const w = screenToWorld(mouse.screenX, mouse.screenY);
  mouse.worldX = w.x;
  mouse.worldY = w.y;

  mouse.x = mouse.screenX;
  mouse.y = mouse.screenY;
});

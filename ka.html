    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Exo" />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lato&family=Material+Icons&display=swap"
    />

    <!--The page title-->
    <title>New webpage</title>
    <!--CSS Styling-->
    <style>
      * {
        transition: 0s;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      script {
        font-family: Pixelify Sans;
        color: black;
      }
      body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        align-items: center;
        transition: 0s;
        background: #000;
        display: flex;
        justify-content: center;
      }
      a {
        display: inline-block;
        position: relative;
        color: rgb(255, 255, 255);
        text-decoration: none;
      }

      a::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: rgb(255, 255, 255);
        visibility: hidden;
        transform: scaleX(0);
        transition: all 0.3s ease-in-out 0s;
      }

      a:hover::before {
        visibility: visible;
        transform: scaleX(1);
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        height: 100vh;
        width: auto;
        display: block;
      }

      canvas:focus {
        outline: none;
      }

      #container {
        position: relative;
        color: black;
        height: 100vh;
        aspect-ratio: auto;
      }

      #container canvas,
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: auto;
      }

      #fullscreen-container {
        position: fixed;
        right: 5px;
        top: 5px;
        left: auto;
      }

      #fullscreen {
        color: white;
        font-size: 28px;
        border-radius: 50%;
        padding: 5px;
        box-sizing: border-box;
        cursor: pointer;
        transition: 200ms;
        position: relative;
        float: right;
      }
      #fullscreen:hover {
        background: #fff2;
      }

      #console {
        color: white;
        margin: 5px;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.06);
        font-family: monospace;
        box-sizing: border-box;
        padding: 6px;
        max-height: 220px;
        overflow: auto;
      }
      #console pre {
        margin: 0;
        white-space: pre-wrap;
      }
      #console .line {
        color: #ddd;
      }
      #console .error {
        color: #ff4d4d;
        font-weight: 700;
      }
      #console .warn {
        color: #ffb86b;
      }
      #console .info {
        color: #9ad0ff;
      }

      .npc-bubble {
        position: absolute;
        transform: translateX(-50%) translateY(-100%);
        margin-top: -12px;

        background: #fff8e7;
        border: 3px solid #2a1a1a;
        border-radius: 6px;
        padding: 8px 14px 10px;
        max-width: 220px;
        min-width: 80px;
        text-align: center;

        font-family: "Exo", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #2a1a1a;
        line-height: 1.4;

        box-shadow: 3px 3px 0 #2a1a1a;
        pointer-events: none;
        z-index: 20;
        transition: opacity 0.1s;
      }

      .npc-bubble::before {
        content: "";
        position: absolute;
        bottom: -14px;
        left: 50%;
        transform: translateX(-50%);
        border: 7px solid transparent;
        border-top-color: #2a1a1a;
      }

      .npc-bubble::after {
        content: "";
        position: absolute;
        bottom: -9px;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: #fff8e7;
        z-index: 1;
      }

      .npc-bubble .npc-progress {
        display: block;
        margin-top: 5px;
        font-size: 10px;
        color: #9a7a5a;
        letter-spacing: 0.05em;
      }

      .npc-prompt {
        position: absolute;
        transform: translateX(-50%) translateY(-100%);
        font-family: "Exo", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        background: #2a1a1a;
        border: 2px solid #fff8e7;
        border-radius: 4px;
        padding: 1px 5px;
        pointer-events: none;
        z-index: 19;
        white-space: nowrap;
      }

      #minimap {
        position: absolute;
        bottom: 8px;
        right: 8px;
        width: 180px;
        height: 140px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        z-index: 15;
        opacity: 0.88;
        pointer-events: auto;
        cursor: grab;
        width: auto !important;
        height: auto !important;
      }
      #minimap.dragging {
        cursor: grabbing;
      }
      #minimap-label {
        position: absolute;
        bottom: 8px;
        right: 8px;
        transform: translateY(-100%);
        font-family: monospace;
        font-size: 8px;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
        z-index: 15;
      }

      .hat-shop {
        position: absolute;
        transform: translateX(-50%) translateY(-100%);
        margin-top: -12px;

        background: #fff8e7;
        border: 3px solid #2a1a1a;
        border-radius: 6px;
        padding: 10px 14px 12px;
        min-width: 210px;

        font-family: "Exo", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #2a1a1a;
        line-height: 1.4;

        box-shadow: 3px 3px 0 #2a1a1a;
        pointer-events: all;
        z-index: 20;
      }

      /* Same tail arrow as .npc-bubble */
      .hat-shop::before {
        content: "";
        position: absolute;
        bottom: -14px;
        left: 50%;
        transform: translateX(-50%);
        border: 7px solid transparent;
        border-top-color: #2a1a1a;
      }

      .hat-shop::after {
        content: "";
        position: absolute;
        bottom: -9px;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: #fff8e7;
        z-index: 1;
      }

      .hat-shop-title {
        font-size: 14px;
        font-weight: 800;
        color: #2a1a1a;
        text-align: center;
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }

      .hat-shop-pts {
        color: #9a7a5a;
        text-align: center;
        font-size: 11px;
        margin-bottom: 8px;
      }

      .hat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid rgba(42, 26, 26, 0.15);
      }
      .hat-row:last-child {
        border-bottom: none;
      }
      .hat-row-equipped {
        color: #7a4a00;
        font-weight: 700;
      }

      .hat-name {
        flex: 1;
      }

      .hat-btn {
        background: rgba(42, 26, 26, 0.07);
        border: 2px solid #2a1a1a;
        color: #2a1a1a;
        font-family: "Exo", sans-serif;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.1s;
        line-height: 1.5;
        white-space: nowrap;
      }
      .hat-btn:hover:not(:disabled) {
        background: rgba(42, 26, 26, 0.18);
      }
      .hat-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .hat-btn-equipped {
        background: rgba(42, 26, 26, 0.14);
        border-color: #2a1a1a;
        color: #7a4a00;
      }

      .hat-shop-hint {
        text-align: center;
        color: #9a7a5a;
        font-size: 10px;
        letter-spacing: 0.05em;
        margin-top: 7px;
      }
    </style>

  <script type>
    //The sign of a num
    function sign(x) {
      return abs(x) / x || 0;
    }

    //returns the random value of a min and max number
    function random(min, max) {
      return Math.random() * (max - min + 1) + min;
    }

    //Calculates a number between two numbers at a specific increment
    function lerp(num1, num2, amt) {
      return num1 + (num2 - num1) * amt;
    }

    // Calculates amount from lerp based on two endpoints and a value
    function antilerp(num1, num2, val) {
      return (val - num1) / (num2 - num1);
    }

    //Re-maps a number from one range to another.
    function map(num, start1, stop1, start2, stop2) {
      return start2 + ((num - start1) / (stop1 - start1)) * (stop2 - start2);
    }

    //Constrains a value to not exceed a maximum and minimum value
    function constrain(num, min, max) {
      return Math.max(Math.min(num, max), min);
    }

    //Calculates the distance between two points
    function dist(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
    }

    //Finds a midpoint
    function midpoint(Ax, Bx, Ay, By) {
      var mx = (Ax + Bx) / 2;
      var my = (Ay + By) / 2;

      return [mx, my];
    }

    //Maps a point to a line where percentage is line length
    function mapToLine(x1, y1, x2, y2, percentage) {
      return {
        x: x1 * (1.0 - percentage) + x2 * percentage,
        y: y1 * (1.0 - percentage) + y2 * percentage,
      };
    }

    /** Creates a global getter */
    function globalGetter(name, f) {
      Object.defineProperty(globalThis, name, {
        get() {
          return f();
        },
      });
    }

    /** Aiming animation */
    function aim(ctx, cx, cy, xdir, ydir, pixel, sep, radius, t) {
      const magdir = Math.sqrt(xdir * xdir + ydir * ydir);
      const c = xdir / magdir,
        s = ydir / magdir;
      const o = Math.ceil(magdir / pixel) * pixel;
      for (let x = cx - o; x < cx + o; x += pixel) {
        for (let y = cy - o; y < cy + o; y += pixel) {
          let val = 0;
          for (let a = t % sep; a < magdir; a += sep) {
            const ratio = a / magdir;
            const bx = cx + a * c,
              by = cy + a * s;
            const dx = x - bx,
              dy = y - by;
            const gauss = Math.exp(-(dx * dx + dy * dy) / (radius * radius));
            // 4 is because (1 - ratio) * ratio has a max val of 0.25
            val += 4 * gauss * (1 - ratio) * ratio;
          }
          ctx.fillStyle = `rgba(255, 255, 255, ${val})`;
          ctx.fillRect(x, y, pixel, pixel);
        }
      }
    }

    const playerTexturer = (t, player) => {
      if (player._hitFlash > 0) return gfx.player.hurt[0];
      const state = player.state ?? "idle";
      const carryMap = {
        idle: "carryidle",
        run: "carryrun",
        jump: "carryjump",
        fall: "carryfall",
      };
      const holding =
        player.ball &&
        (player.engine.slowMo || player.dragging || player.carrying);
      const spriteState = holding && carryMap[state] ? carryMap[state] : state;
      const frames = gfx.player[spriteState] ?? gfx.player.idle;
      const fps = ANIM_FPS[state] ?? 6;
      const count = Object.keys(frames).length;
      let frame;

      //if you prefer chaining if else statements you need help
      switch (state) {
        case "jump":
        case "fall": {
          frame = Math.min(count - 1, Math.floor((player.airTime ?? 0) * fps));
          break;
        }
        case "groundpound": {
          frame = 0;
          break;
        }
        case "groundpoundimpact": {
          //play impact frames forward once then hold last
          frame = Math.min(
            count - 1,
            Math.floor((player.impactTime ?? 0) * fps),
          );
          break;
        }
        case "throw": {
          const dx = player.dragX - player.dragInitX;
          const dy = player.dragY - player.dragInitY;
          const len = Math.sqrt(dx * dx + dy * dy);
          frame = Math.floor(Math.min(len / player.maxDrag, 1) * (count - 1));
          break;
        }
        case "wallslide": {
          return gfx.player.wallslide;
        }
        default: {
          frame = Math.floor(t * fps) % count;
        }
      }

      //just in case yk?
      frame = Math.max(0, Math.min(count - 1, frame));
      return frames[frame];
    };
  </script>
  <!-- canvas -->
  <script type>
    //collect and delete animation frames that have already occured
    for (var i = window.requestAnimationFrame(function () {}); i > 0; i--) {
      window.cancelAnimationFrame(i);
    }

    //load HTML canvas
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    //width and height are changeable
    let width = canvas.width;
    let height = canvas.height;
    globalGetter("effectiveWidth", () => canvas.effectiveWidth);
    globalGetter("effectiveHeight", () => canvas.effectiveHeight);

    const BASE_WIDTH = 600;
    const BASE_HEIGHT = 600;

    //world to CSS pixel scale
    let displayScale = 1;

    //device pixel ratio
    let dprVal = window.devicePixelRatio || 1;

    /**
     * resizes the canvas to match the window dimensions and scales it based on the device pixel ratio (DPR).
     * adjusts the internal coordinate system to maintain sharpness on high-DPI displays and
     * updates the global display scale based on a predefined base resolution (BASE_WIDTH, BASE_HEIGHT)
     *
     * @function
     * @returns {void}
     */
    function resizeCanvasAndScale() {
      /* 
        @Judges - This function is used to scale the canvas up to a specified dimension.
        Making it based on the height of the page only allows me to set it at a perfecct 1:1 aspect ratio.
        The reason this is so fast is because it scales it up with window.devicePixelRation
        and uses the built in canvas functions for transformations (setTransform) 
    */
      const cssW = window.innerWidth;
      const cssH = window.innerHeight;
      dprVal = window.devicePixelRatio || 1;

      //calculate the size that maintains aspect ratio
      const aspectRatio = BASE_WIDTH / BASE_HEIGHT;
      let canvasDisplayWidth, canvasDisplayHeight;

      if (cssW / cssH > aspectRatio) {
        canvasDisplayHeight = cssH;
        canvasDisplayWidth = cssH * aspectRatio;
      } else {
        //window is taller than canvas aspect ratio
        canvasDisplayWidth = cssW;
        canvasDisplayHeight = cssW / aspectRatio;
      }

      //update wrapper size and position
      const wrapper = document.getElementById("game-wrapper");
      if (wrapper) {
        wrapper.style.width = canvasDisplayWidth + "px";
        wrapper.style.height = canvasDisplayHeight + "px";
      }

      canvas.style.width = canvasDisplayWidth + "px";
      canvas.style.height = canvasDisplayHeight + "px";
      canvas.width = Math.round(canvasDisplayWidth * dprVal);
      canvas.height = Math.round(canvasDisplayHeight * dprVal);
      // tracking variables
      canvas.effectiveWidth = canvasDisplayWidth;
      canvas.effectiveHeight = canvasDisplayHeight;

      //update display scale
      width = canvas.width;
      height = canvas.height;

      ctx.scale(dprVal, dprVal);
      ctx.imageSmoothingEnabled = false;
      ctx.webkitImageSmoothingEnabled = false;
      ctx.mozImageSmoothingEnabled = false;
      ctx.msImageSmoothingEnabled = false;
      ctx.oImageSmoothingEnabled = false;

      window.scene = "game";
    }
    window.addEventListener("resize", resizeCanvasAndScale);
    resizeCanvasAndScale();
  </script>

    /** Sprite reference, from spritesheet.
     *
     */
    class SpriteRef {
      /** Constructs an instance of SpriteRef.
       *
       * @constructor
       * @param {CanvsaImageSource} spritesheet
       * @param {number} x
       * @param {number} y
       * @param {number} w
       * @param {number} h
       */
      constructor(spritesheet, x, y, w, h) {
        this.spritesheet = spritesheet;
        // SOURCE, NOT DESTINATION COORDINATES!
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
      }
      /** Draws the sprite reference onto a canvas.
       *
       * @param {CanvasRenderingContext2D} ctx
       * @param {number} x
       * @param {number} y
       * @param {number} pixel - pixel size
       * @returns {void}
       */
      // draw(ctx, x, y, pixel, flip = 1) {
      //     // this.x, etc is source coordinates
      //     // x, y, etc is destination coordinates
      //     ctx.save();
      //     ctx.imageSmoothingEnabled = false;
      //     if (flip === -1) {
      //         //mirror around the sprite's center
      //         ctx.translate(x + this.w * pixel, 0);
      //         ctx.scale(-1, 1);
      //         x = 0;
      //     }
      //     ctx.drawImage(
      //         this.spritesheet,
      //         this.x, this.y, this.w, this.h,
      //         x, y, this.w * pixel, this.h * pixel
      //     );
      //     ctx.restore();
      // }

      //trying to fix the lines
      draw(ctx, x, y, pixel, flip = 1) {
        ctx.save();
        ctx.imageSmoothingEnabled = false;
        if (flip === -1) {
          ctx.translate(Math.floor(x + this.w * pixel), 0);
          ctx.scale(-1, 1);
          x = 0;
        }
        ctx.drawImage(
          this.spritesheet,
          this.x,
          this.y,
          this.w,
          this.h,
          Math.floor(x),
          Math.floor(y),
          Math.ceil(this.w * pixel),
          Math.ceil(this.h * pixel),
        );
        ctx.restore();
      }
    }

    /** Spritesheet, containing all sprites.
     *
     */
    class Spritesheet {
      /** Constructs an instance of Spritesheet.
       *
       * @param {number} width
       * @param {number} height
       */
      constructor(width, height) {
        this.canvas = document.createElement("canvas");
        this.canvas.width = width;
        this.canvas.height = height;
        this.w = width;
        this.h = height;
        this.ctx = this.canvas.getContext("2d");
        // tracking variables so sprites don't overlap
        this.penX = 0;
        this.penY = 0;
        this.nextY = 0;
      }

      /** INTERNAL: Stores a single sprite into an imageData.
       *
       * @param {ImageData} imageData
       * @param {number[][]} palette
       * @param {string[]} sprite
       * @returns {SpriteRef}
       */
      #internalStoreImageData(imageData, palette, sprite) {
        const spriteH = sprite.length;
        const spriteW = Math.max(...sprite.map((row) => row.length));
        if (spriteW > this.w) {
          throw "Error: spritesheet is too small for image to fit!";
        }
        let endX = this.penX + spriteW,
          endY;
        if (endX > this.w) {
          this.penX = 0;
          this.penY = this.nextY;
          endX = this.penX + spriteW;
        }
        endY = this.penY + spriteH;
        if (endY > this.h) {
          throw "Error: spritesheet is too small for image to fit!";
        }
        const spriteRef = new SpriteRef(
          this.canvas,
          this.penX,
          this.penY,
          spriteW,
          spriteH,
        );
        for (let y = this.penY; y < endY; y++) {
          for (let x = this.penX; x < endX; x++) {
            // imageData.data is a 1-dimensional array
            // 4 values for each pixel, r g b a
            // this gets the location of the pixel in the data
            // << 2 is a fancy way of multiplying by 4
            const n = (y * this.w + x) * 4;
            const c = palette?.[sprite[y - this.penY]?.[x - this.penX]];
            if (c) {
              imageData.data[n + 0] = c[0];
              imageData.data[n + 1] = c[1];
              imageData.data[n + 2] = c[2];
              imageData.data[n + 3] = c[3];
            }
          }
        }
        this.penX = endX;
        if (endY > this.nextY) this.nextY = endY;
        return spriteRef;
      }

      /** INTERNAL: Stores a bunch of sprites in the spritesheet at once. It is more
       * efficient to store many at once than many in many calls.
       *
       * @param {number[][]} palette
       * @param {Object} sprites
       * @returns {Object|SpriteRef[]|SpriteRef}
       */
      #internalStoreMultipleImageData(imageData, palette, sprites) {
        if (Array.isArray(sprites) && typeof sprites[0] === "string") {
          // we've hit a sprite, and now, we can store image data
          // (sprites is singular here lol)
          return this.#internalStoreImageData(imageData, palette, sprites);
        } else if (Array.isArray(sprites)) {
          const spriteRefs = [];
          for (const sprite of sprites) {
            spriteRefs.push(
              this.#internalStoreMultipleImageData(imageData, palette, sprite),
            );
          }
          return spriteRefs;
        } else {
          const spriteRefs = {};
          for (const i in sprites) {
            spriteRefs[i] = this.#internalStoreMultipleImageData(
              imageData,
              palette,
              sprites[i],
            );
          }
          return spriteRefs;
        }
      }

      /** Stores a bunch of sprites in the spritesheet at once. It is more
       * efficient to store many at once than many in many calls.
       *
       * @param {number[][]} palette
       * @param {Object} sprites
       * @returns {Object}
       */
      store(palette, sprites) {
        const imageData = this.ctx.getImageData(0, 0, this.w, this.h);
        const spriteRefs = this.#internalStoreMultipleImageData(
          imageData,
          palette,
          sprites,
        );
        this.ctx.putImageData(imageData, 0, 0);
        return spriteRefs;
      }
    }

    function generateAutoTileset(interior, seam = ".", corner = "-") {
      const variants = {};
      for (const N of ["y", "n"])
        for (const E of ["y", "n"])
          for (const S of ["y", "n"])
            for (const W of ["y", "n"]) {
              const neOpts = N === "n" && E === "n" ? ["y", "n"] : ["y"];
              const seOpts = S === "n" && E === "n" ? ["y", "n"] : ["y"];
              const swOpts = S === "n" && W === "n" ? ["y", "n"] : ["y"];
              const nwOpts = N === "n" && W === "n" ? ["y", "n"] : ["y"];

              for (const NE of neOpts)
                for (const SE of seOpts)
                  for (const SW of swOpts)
                    for (const NW of nwOpts) {
                      const key = N + NE + E + SE + S + SW + W + NW;
                      const rows = interior.map((r) => r.split(""));
                      const H = rows.length,
                        Ww = rows[0].length;

                      if (N === "n")
                        for (let c = 0; c < Ww; c++) rows[0][c] = seam;
                      if (S === "n")
                        for (let c = 0; c < Ww; c++) rows[H - 1][c] = seam;
                      if (E === "n")
                        for (let r = 0; r < H; r++) rows[r][Ww - 1] = seam;
                      if (W === "n")
                        for (let r = 0; r < H; r++) rows[r][0] = seam;
                      if (N === "n" && W === "n")
                        rows[0][0] = NW === "n" ? corner : seam;
                      if (N === "n" && E === "n")
                        rows[0][Ww - 1] = NE === "n" ? corner : seam;
                      if (S === "n" && W === "n")
                        rows[H - 1][0] = SW === "n" ? corner : seam;
                      if (S === "n" && E === "n")
                        rows[H - 1][Ww - 1] = SE === "n" ? corner : seam;

                      variants[key] = rows.map((r) => r.join(""));
                    }
            }
      return variants;
    }

    //for testing
    const tileInteriors = {
      C: [
        "ddddddddd",
        "deeeeeeed",

      D: [
        "ccccccccc",

        "ccccccccc",
        "cbbbbbbbc",
        "cbbbbbbbc",
        "ccccccccc",
        "cbbbbbbbc",
        "cbbbbbbbc",
      ],
    };

    for (const [key, interior] of Object.entries(tileInteriors)) {
      gfxData.tiles[key] = generateAutoTileset(interior);
    }

    const spritesheet = new Spritesheet(1024, 1024);
    const gfx = spritesheet.store(palette, gfxData);

    gfx.player.groundpoundimpact = {
      0: gfx.player.groundpound[1],
      1: gfx.player.groundpound[2],
      2: gfx.player.groundpound[3],
      3: gfx.player.groundpound[4],
    };

    gfx.empty = new SpriteRef(spritesheet.canvas, 0, 0, 0, 0);

    //store backgrounds
    for (const key in gfxData.props.backdrops) {
      gfx.props.backdrops[key] = spritesheet.store(palette, [
        gfxData.props.backdrops[key],
      ])[0];
    }

      /** MBox: an AABB hitbox implementation.
       *
       */
      class MBox {
        /** Constructs an instance of MBox.
         *
         * @constructor
         * @param {number} x1
         * @param {number} y1
         * @param {number} x2
         * @param {number} y2
         */
        constructor(x1, y1, x2, y2) {
          this.engine = null;
          this.set(x1, y1, x2, y2);
        }

        /** Alternative to new MBox for width and height
         *
         * @param {number} x
         * @param {number} y
         * @param {number} w
         * @param {number} h
         * @returns {void}
         */
        static fromWH(x, y, w, h) {
          return new MBox(x, y, x + w, y + h);
        }

        /** Sets the hitbox without creating a new instance.
         *
         * @param {number} x1
         * @param {number} y1
         * @param {number} x2
         * @param {number} y2
         * @returns {void}
         */
        set(x1, y1, x2, y2) {
          // Doing this makes the math easier later on
          this.x1 = Math.min(x1, x2);
          this.y1 = Math.min(y1, y2);
          this.x2 = Math.max(x1, x2);
          this.y2 = Math.max(y1, y2);
        }

        /** Sets the hitbox without creating a new instance, for width and height.
         *
         * @param {number} x
         * @param {number} y
         * @param {number} w
         * @param {number} h
         * @returns {void}
         */
        setWH(x, y, w, h) {
          this.set(x, y, x + w, y + h);
        }

        get w() {
          return this.x2 - this.x1;
        }

        get h() {
          return this.y2 - this.y1;
        }

        /** Checks for collision with alternate MBox
         *
         * @param {MBox} that
         * @returns {boolean}
         */
        collision(that) {
          return (
            this.x1 <= that.x2 &&
            that.x1 <= this.x2 &&
            this.y1 <= that.y2 &&
            that.y1 <= this.y2
          );
        }
      }

         * @param {number} x

         * @param {number} w
         * @param {number} h
         * @param {(number, MObject) => SpriteRef} texturer
         */
        constructor(x, y, w, h, texturer) {
          super(x, y, w, h, texturer);
        }
      }

      class MLava extends MHazard {
        static ANIM_FPS = 9;
        constructor(x, y, isTop) {
          super(x, y, 1, 1, (t, self) => {
            if (!self.isTop) {
              let frames = gfx.props.environment.poison;
              return frames[Math.floor(t * MLava.ANIM_FPS) % frames.length];
            } else if (self.isTop) {
              let frames = gfx.props.environment.poisonTop;
              return frames[Math.floor(t * MLava.ANIM_FPS) % frames.length];
            }
          });
          this.isTop = isTop;
        }
      }

      /** MEntity: any movable entity.
       *
       */
      class MEntity extends MBody {
        /** Constructs an instance of MEntity.
         *
         * @constructor
         * @param {number} x
         * @param {number} y
         * @param {number} w
         * @param {number} h
         * @param {(number, MObject) => SpriteRef} texturer
         */
        constructor(x, y, w, h, maxHealth, texturer) {
          super(x, y, w, h, texturer);
          this.sx = x;
          this.sy = y;
          this.sroom = null;
          this.w = w;
          this.h = h;
          this.xv = 0;
          this.yv = 0;
          this.contactCooldown = 0;
          this.maxHealth = maxHealth;
          this.health = this.maxHealth;
          this.coyote = 0;
          this.coyoteLimit = 0.2;
          this.defrictioned = false;
          this._wasDefrictioned = false;
        }

        /** Update hitbox
         *
         * @returns {void}
         */
        updateHitbox() {
          this.hbox.setWH(this.x, this.y, this.w, this.h);
          this.dbox.setWH(this.x, this.y, this.w, this.h);
        }

        /** Transport entity to a different room if it enters one
         *
         * @returns {void}
         */
        transport() {
          this.engine.world.transportEntity(this);
        }

        /** Goes through array, returns first element touching of type
         *
         * @param {typeof MObject} type
         * @param {MWorld} world
         * @returns {MObject?}
         */
        touching(type, world) {
          return world.iterateRoom(this.room, (obj) => {
            if (obj instanceof type && obj?.hbox?.collision?.(this.hbox))
              return obj;
          });
        }

        /** Goes through array, returns all elements touching of type
         *
         * @param {typeof MObject} type
         * @param {MWorld} world
         * @returns {MObject[]}
         */
        touchingAll(type, world) {
          const out = [];
          world.iterateRoom(this.room, (obj) => {
            if (obj instanceof type && obj?.hbox?.collision?.(this.hbox))
              out.push(obj);
          });
          return out;
        }

        /** Tick the entity forward
         *
         * @param {number} dt
         * @param {Object} events
         * @param {{ hvel?: number, jump?: number }} [attributes={}]
         * @returns {void}
         */
        tick(dt, events, attributes = {}) {
          const hvel = attributes.hvel ?? this.engine.hvel;
          const jump = attributes.jump ?? this.engine.jump;
          let friction = attributes.friction ?? this.engine.friction;
          if (this.defrictioned) {
            friction = 1 - (1 - friction) * 0.00001;
          }
          const gravity = attributes.gravity ?? this.engine.gravity;
          const world = this.engine.world;
          const xAccel = -hvel * Math.log(friction);
          if (events.KeyA) {
            this.xv -= xAccel * dt;
          }
          if (events.KeyD) {
            this.xv += xAccel * dt;
          }
          this.xv *= Math.pow(friction, dt);
          this.x += this.xv * dt;
          this.transport();
          if (this.touching(MSolid, world)) {
            this.x -= this.xv * dt;
            this.xv = 0;
            this.defrictioned = false;
            this.transport();
          }
          this.yv += gravity * dt;
          this.grounded = false;
          this.y += this.yv * dt;
          this.transport();
          if (this.touching(MSolid, world)) {
            this.y -= this.yv * dt;
            this.defrictioned = false;
            if (this.yv > 0) {
              this.grounded = true;
              this.coyote = 0;
            }
            this.yv = 0;
            this.transport();
          } else {
            this.coyote += dt;
          }

          if (this.coyote <= this.coyoteLimit && events.KeyW) {
            this.coyote = Infinity;
            this.yv = -jump;
          }
          if (this.touching(MHazard, world)) {
            this.onDeath?.();
            this.x = this.sx;
            this.y = this.sy;
            this.room = this.sroom;
            this.health = this.maxHealth;
            this.transport();
          }
          this._wasDefrictioned = this.defrictioned;
        }

        remove() {
          const idx = this.room?.entities.indexOf(this);
          if (idx != null && idx !== -1) this.room.entities.splice(idx, 1);
        }

        data() {
          return {};
        }
      }

      class MBall extends MEntity {
        static bounce = 0.65;

        constructor(owner, xv, yv) {
          const w = 1,
            h = 1;
          super(
            owner.x + owner.w / 2 - w / 2,
            owner.y + owner.h / 2 - h / 2,
            w,
            h,
            1,
            () => gfx.player.spikeBall,
          );
          this.hboxSmall = 0.2; // thing that says how much to shrink the ball's hbox by
          this.xv = xv;
          this.yv = yv;
          this.owner = owner;
          this.engine = owner.engine;
          this.room = owner.room;
          this.angle = 0;
          this.onGround = false;
          this._hitCooldowns = new Map();
        }

        /** Update hitbox
         *
         * @returns {void}
         */
        updateHitbox() {
          this.hbox.setWH(
            this.x + this.hboxSmall,
            this.y + this.hboxSmall,
            this.w - 2 * this.hboxSmall,
            this.h - 2 * this.hboxSmall,
          );
          this.dbox.setWH(this.x, this.y, this.w, this.h);
        }

        render(ctx, camera, t, pixel) {
          const { x, y } = camera.worldToScreen(this.x, this.y);
          const sprite = this.texturer(t, this);
          const sw = sprite.w * pixel;
          const sh = sprite.h * pixel;
          const cx = x + (this.w * camera.tsz) / 2;
          const cy = y + (this.h * camera.tsz) / 2;

          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(this.angle);
          sprite.draw(ctx, -sw / 2, -sh / 2, pixel);
          ctx.restore();
        }

        tick(dt) {
          const { world, gravity, epsilon } = this.engine;

          this.x += this.xv * dt;
          this.transport();
          const xt = this.touching(MSolid, world);
          if (xt) {
            if (
              xt instanceof MBreakWall &&
              !xt._breaking &&
              !this._hitCooldowns.has(xt)
            ) {
              if (xt.onBallHit(this)) {
                //correct side so da ball punches through, an the wall starts crumbling
                this._hitCooldowns.set(xt, MBreakWall.BREAK_DURATION + 0.1);
              } else {
                //wrong side.
                this.x =
                  this.xv > 0
                    ? xt.hbox.x1 - this.w + this.hboxSmall - epsilon
                    : xt.hbox.x2 - this.hboxSmall + epsilon;
                this.xv *= -MBall.bounce;
                //this.engine.onBallBounce?.();
              }
            } else if (!(xt instanceof MBreakWall && xt._breaking)) {
              this.x =
                this.xv > 0
                  ? xt.hbox.x1 - this.w + this.hboxSmall - epsilon
                  : xt.hbox.x2 - this.hboxSmall + epsilon;
              this.xv *= -MBall.bounce;
              this.engine.onBallBounce?.(Math.abs(this.xv));
            }
          }

          this.onGround = false;
          this.yv += gravity * dt;
          this.y += this.yv * dt;
          this.transport();
          const yt = this.touching(MSolid, world);
          if (yt) {
            const falling = this.yv > 0;
            this.y = falling
              ? yt.hbox.y1 - this.h + this.hboxSmall - epsilon
              : yt.hbox.y2 - this.hboxSmall + epsilon;
            this.yv *= -MBall.bounce;
            if (falling) {
              this.onGround = true;
              if (Math.abs(this.yv) < 0.8) this.yv = 0;
            }
            this.engine.onBallBounce?.(Math.abs(this.yv));
          }

          //tick down per-enemy hit cooldowns
          for (const [enemy, cd] of this._hitCooldowns) {
            const remaining = cd - dt;
            if (remaining <= 0) this._hitCooldowns.delete(enemy);
            else this._hitCooldowns.set(enemy, remaining);
          }

          if (!this.owner.carrying) {
            //enemy collision bounce and deal damage
            let hitEnemies = this.touchingAll(MEnemy, world);
            if (this.hbox.collision(this.engine.player)) {
              hitEnemies.push(this.engine.player);
            }
            hitEnemies = hitEnemies.filter((e) => e != this.owner);
            for (const enemy of hitEnemies) {
              if (enemy.dead || this._hitCooldowns.has(enemy)) continue;

              //reflect whichever axis has less overlap (same logic as solid)
              const dx = this.x + this.w / 2 - (enemy.x + enemy.w / 2);
              const dy = this.y + this.h / 2 - (enemy.y + enemy.h / 2);
              if (Math.abs(dx) >= Math.abs(dy)) {
                this.xv *= -MBall.bounce;
              } else {
                this.yv *= -MBall.bounce;
              }

              enemy.takeDamage(30);
              //grace peroid is 300ms
              this._hitCooldowns.set(enemy, 0.3);
            }
          }

          //spin proportional to horizontal speed
          this.angle += this.xv * dt * 3;
          this.transport();
        }

        data() {
          return {
            x: this.x,
            y: this.y,
            xv: this.xv,
            yv: this.yv,
            roomrow: this.room.row,
            roomcol: this.room.col,
          };
        }

        static fromData(data, owner) {
          const b = new MBall(owner, data.xv, data.yv);
          b.x = data.x;
          b.y = data.y;
          b.room = this.engine.world.rooms[data.roomrow][data.roomcol];
          return b;
        }
      }

      /** MPlayer: the player.
       *
       */
      class MPlayer extends MEntity {
        static throwFactor = 14;
        static maxDrag = 180;
        static minDrag = 28;

        /** Constructs an instance of MPlayer.
         *
         * @constructor
         * @param {number} x
         * @param {number} y
         * @param {number} w
         * @param {number} h
         * @param {(number, MObject) => SpriteRef} texturer
         */
        constructor(x, y, w, h, texturer) {
          super(x, y, w, h, 100, texturer);
          this.state = "idle";
          this.facing = 1;
          this.groundPounding = false;
          this.groundPoundTime = 0;
          this.impactTime = null;
          this.dragging = false;
          this.carrying = false;
          this.dragInitX = 0;
          this.dragInitY = 0;
          this.dragX = 0;
          this.dragY = 0;
          this.ball = null; //new MBall(this, 0, 0);
          this.carrying = true;

          this.maxDrag = 180;
          this.powers = {
            ball: false,
            groundedTeleport: false,
            groundPound: false,
            fullTeleport: false,
            wallJump: false,
          };
          this._hitFlash = 0;

          this.wallSliding = false;
          this.wallDir = 0;

          this._wallJumpCooldown = 0;
          this.gpExt = 2; // ground pound extension
        }

        takeDamage(amount) {
          this.health = Math.max(0, this.health - amount);
          this._hitFlash = 0.18;
        }

        _separateFromEnemies() {
          const room = this.room;
          const world = this.engine?.world;
          if (!room || !world) return;

          for (const z of room.indices) {
            for (const obj of room.zia[z]) {
              if (!(obj instanceof MEnemy) || obj.dead) continue;

              const overlapX = this.x + this.w / 2 - (obj.x + obj.w / 2);
              const overlapY = this.y + this.h / 2 - (obj.y + obj.h / 2);
              const minDistX = (this.w + obj.w) / 2;
              const minDistY = (this.h + obj.h) / 2;
              const absX = Math.abs(overlapX);
              const absY = Math.abs(overlapY);

              if (absX < minDistX && absY < minDistY) {
                if (minDistX - absX < minDistY - absY) {
                  //horizontal
                  const push = minDistX - absX;
                  const prevX = this.x;
                  this.x += overlapX > 0 ? push : -push;
                  this.updateHitbox();
                  if (this.touching(MSolid, world)) {
                    this.x = prevX;
                    this.updateHitbox();
                    const prevObjX = obj.x;
                    obj.x += overlapX > 0 ? -push : push;
                    obj.updateHitbox();
                    if (obj.touching(MSolid, world)) {
                      obj.x = prevObjX;
                      obj.updateHitbox();
                    }
                  }
                } else {
                  //vertical
                  const push = minDistY - absY;
                  if (overlapY < 0) {
                    this._groundedOnEnemy = true;
                    if (this._standingOnEnemy !== obj) {
                      this._standingOnEnemy = obj;
                      this._standingOnEnemyTimer = 0;
                    }
                    this._standingOnEnemyTimer += this.engine.lastDt ?? 0;
                    if (this._standingOnEnemyTimer >= 1.0) {
                      this._standingOnEnemyTimer = 0;
                      obj.onPlayerContact(this);
                    }

                    //player on top of enemy
                    this.y -= push;
                    this.yv = Math.min(this.yv, 0);
                    this.grounded = true;
                    this.updateHitbox();

                    //player should be able to jumnp of enemy...
                    const events = this.engine.events ?? {};
                    if (events.KeyW) {
                      this.yv = -this.engine.jump;
                      this.grounded = false;
                    }
                  } else {
                    //player above enemy
                    const prevY = this.y;
                    this.y += push;
                    this.updateHitbox();
                    if (this.touching(MSolid, world)) {
                      this.y = prevY;
                      this.updateHitbox();
                    }
                  }
                }
              }
            }
          }
        }

        onDeath() {
          const dr = this.sroom.row - this.room.row;
          const dc = this.sroom.col - this.room.col;
          if (Math.abs(dr) + Math.abs(dc) >= 1) {
            const dir =
              dc > 0 && dc > Math.abs(dr)
                ? "right"
                : dc < 0 && -dc > Math.abs(dr)
                  ? "left"
                  : dr > 0 && dr >= Math.abs(dc)
                    ? "bottom"
                    : "top";
            this._roomChangedThisFrame = true;
            this.engine.onRoomChange?.(dir);
          }
          if (this.ball) this.carrying = true;
          this.groundPounding = false;
          this.engine.infinalfight = false;
        }

        /** Tick the game forward
         *
         * @param {number} dt
         * @param {Object} events
         * @param {Object} eventsPrev
         * @returns {void}
         */
        tick(dt, events, eventsPrev) {
          //const canGroundPound = !this.grounded && !this.groundPounding && (this.airTime ?? 0) > 0.1;
          const canGroundPound =
            this.powers.groundPound &&
            !this.grounded &&
            !this.groundPounding &&
            (this.airTime ?? 0) > 0.1;
          const keySJustPressed = events.KeyS && !eventsPrev.KeyS;

          if (canGroundPound && keySJustPressed) {
            this.groundPounding = true;
            this.groundPoundTime = 0;
            this.impactTime = null;
            this.yv = this.engine.jump * this.engine.groundPoundMult;
          }

          if (this.groundPounding) this.groundPoundTime += dt;
          if (this.impactTime !== null) this.impactTime += dt;

          if (this._hitFlash > 0) this._hitFlash -= dt;
          if (!this._groundedOnEnemy) {
            this._standingOnEnemy = null;
            this._standingOnEnemyTimer = 0;
          }
          this._groundedOnEnemy = false;

          //wall slide and jump
          if (this._wallJumpCooldown > 0) this._wallJumpCooldown -= dt;

          this.wallSliding = false;
          if (!this.grounded && this.yv > 0 && this._wallJumpCooldown <= 0) {
            const probe = 0.15;
            if (events.KeyD) {
              this.x += probe;
              this.updateHitbox();
              if (this.touching(MSolid, this.engine.world)) {
                this.wallSliding = true;
                this.wallDir = 1;
              }
              this.x -= probe;
              this.updateHitbox();
            }
            if (!this.wallSliding && events.KeyA) {
              this.x -= probe;
              this.updateHitbox();
              if (this.touching(MSolid, this.engine.world)) {
                this.wallSliding = true;
                this.wallDir = -1;
              }
              this.x += probe;
              this.updateHitbox();
            }
          }
          if (this.wallSliding) {
            if (this.yv > 3) this.yv = 3;
            this.facing = -this.wallDir;
          }
          //wall jump
          if (
            this.wallSliding &&
            this.powers.wallJump &&
            events.KeyW &&
            !eventsPrev.KeyW
          ) {
            this.yv = -this.engine.jump;
            this.xv = -this.wallDir * this.engine.hvel * 0.8;
            this.wallSliding = false;
            this._wallJumpCooldown = 0.35;
          }

          //then colide
          this._separateFromEnemies();

          //enemies hit when the player carrying basically a convulated way of accomplishing that
          if (!this.carrying) this.ball?.tick?.(dt, {}, { friction: 1 });

          //if (events.Mouse && !this.prevMouse && !this.ball) {
          if (
            events.Mouse &&
            !eventsPrev.Mouse &&
            (!this.ball || this.carrying) &&
            this.powers.ball
          ) {
            this.dragging = true;
            this.dragInitX = events.MouseX;
            this.dragInitY = events.MouseY;
            this.dragX = events.MouseX;
            this.dragY = events.MouseY;
            //reuse existing if recalled
            if (!this.ball) this.ball = new MBall(this, 0, 0);
            this.carrying = true;
          } else if (events.Mouse && this.dragging) {
            //update drag
            this.dragX = events.MouseX;
            this.dragY = events.MouseY;
          } else if (!events.Mouse && this.dragging) {
            this.dragging = false;
            this.engine.slowMo = false;
            const tsz = this.engine.renderer.camera.tsz;
            let dx = this.dragX - this.dragInitX;
            let dy = this.dragY - this.dragInitY;
            const len = Math.sqrt(dx * dx + dy * dy);
            this.carrying = false;
            if (len < this.constructor.minDrag) {
              //don't destroy it :sob
              this.carrying = true;
            } else {
              //real throw
              this.engine.onBallThrow?.();
              if (len > this.constructor.maxDrag) {
                dx = (dx / len) * this.constructor.maxDrag;
                dy = (dy / len) * this.constructor.maxDrag;
              }
              this.ball = new MBall(
                this,
                (dx / tsz) * MPlayer.throwFactor,
                (dy / tsz) * MPlayer.throwFactor,
              );
            }
          } else if (
            events.Mouse &&
            !eventsPrev.Mouse &&
            this.ball &&
            !this.carrying
          ) {
            const canTeleport =
              this.powers.fullTeleport ||
              (this.powers.groundedTeleport && this.ball.onGround);
            if (canTeleport) {
              //click while ball is out so holding and dragging right away works for quick chaining
              const epsilon = this.engine.epsilon;
              this.x = this.ball.x + this.ball.w / 2 - this.w / 2;
              this.y = this.ball.y + this.ball.h / 2 - this.h / 2;
              this.xv = this.ball.xv;
              this.yv = this.ball.yv;
              if (this.ball.room != this.room) {
                const dr = this.ball.room.row - this.room.row;
                const dc = this.ball.room.col - this.room.col;
                this.room = this.ball.room;
                const dir =
                  dc > 0 && dc > Math.abs(dr)
                    ? "right"
                    : dc < 0 && -dc > Math.abs(dr)
                      ? "left"
                      : dr > 0 && dr >= Math.abs(dc)
                        ? "bottom"
                        : "top";
                this._roomChangedThisFrame = true;
                this.engine.onRoomChange?.(dir);
              }
              this.transport();
              this.engine.slowMo = true;
              this.carrying = true;
              //ball stays alive
              this.dragging = true;
              this.dragInitX = events.MouseX;
              this.dragInitY = events.MouseY;
              this.dragX = events.MouseX;
              this.dragY = events.MouseY;

              //push player out of any wall they landed in
              const world = this.engine.world;
              this.updateHitbox();
              const t = this.touchingAll(MSolid, world);
              if (t) {
                const colls = [];
                for (const b of t) {
                  // block to left of player
                  if (b.hbox.x1 < this.hbox.x1 && this.hbox.x1 < b.hbox.x2) {
                    colls.push(["left", b, b.hbox.x2 - this.hbox.x1]);
                  }
                  // block to right of player
                  if (b.hbox.x1 < this.hbox.x2 && this.hbox.x2 < b.hbox.x2) {
                    colls.push(["right", b, this.hbox.x2 - b.hbox.x1]);
                  }
                  // block below player
                  if (b.hbox.y1 < this.hbox.y1 && this.hbox.y1 < b.hbox.y2) {
                    colls.push(["down", b, b.hbox.y2 - this.hbox.y1]);
                  }
                  // block above player
                  if (b.hbox.y1 < this.hbox.y2 && this.hbox.y2 < b.hbox.y2) {
                    colls.push(["up", b, this.hbox.y2 - b.hbox.y1]);
                  }
                }
                colls.sort((a, b) => a[2] - b[2]);
                for (const coll of colls) {
                  const [side, b, pdepth] = coll;
                  if (this.hbox.collision(b.hbox)) {
                    switch (side) {
                      case "left":
                        this.x = b.hbox.x2 + epsilon;
                        break;
                      case "right":
                        this.x = b.hbox.x1 - this.w - epsilon;
                        break;
                      case "down":
                        this.y = b.hbox.y2 + epsilon;
                        break;
                      case "up":
                        this.y = b.hbox.y1 - this.h - epsilon;
                        break;
                    }
                    this.updateHitbox();
                  }
                }
              }
              this.transport();
            }
          }

          //exit slowmo on keypress or on landing also pretty important
          if (this.engine.slowMo) {
            if (events.KeyA || events.KeyD || events.KeyW || events.KeyS) {
              this.engine.slowMo = false;
            }
            if (this.grounded && !this._wasGrounded) {
              this.engine.slowMo = false;
            }
          }

          //remove ball on any keypress while it's in free flight
          // if (this.ball && !this.carrying && !this.engine.slowMo && !this.dragging) {
          //     if (events.KeyA || events.KeyD || events.KeyW || events.KeyS) {
          //         this.ball = null;
          //     }
          // }

          if (
            this.ball &&
            !this.carrying &&
            !this.engine.slowMo &&
            !this.dragging
          ) {
            if (events.KeyE) {
              this.carrying = true;
            }
          }

          if (events.KeyA) this.facing = -1;
          if (events.KeyD) this.facing = 1;

          if (this.groundPounding && this.grounded) {
            this.groundPounding = false;
            this.impactTime = 0;
            this.engine.onGroundPound?.();
            // enemy collision deal damage by groundpound
            const extendedBox = MBox.fromWH(
              this.x - this.gpExt,
              this.y,
              this.w + 2 * this.gpExt,
              this.h + this.gpExt,
            );
            let hitEnemies = [];
            this.engine.world.iterateRoom(this.room, (obj) => {
              if (obj instanceof MEnemy && obj?.hbox?.collision?.(extendedBox))
                hitEnemies.push(obj);
            });
            for (const enemy of hitEnemies) {
              if (enemy.dead) continue;
              let dx;
              if (this.x > enemy.hbox.x1 && this.x < enemy.hbox.x2) {
                dx = 0;
              } else if (this.x <= enemy.hbox.x1) {
                dx = enemy.hbox.x1 - this.x;
              } else if (this.x >= enemy.hbox.x2) {
                dx = this.x - enemy.hbox.x2;
              }
              const gauss = Math.exp(-dx * dx);
              enemy.takeDamage(
                this.groundPoundTime * 300 * gauss,
                "groundpound",
              );
              // knockback the enemies
              enemy.yv -= 20 * gauss;
              enemy.xv -= 50 * dx * gauss;
              enemy.defrictioned = true;
            }
          }

          const impactDuration = 0.4;
          if (this.impactTime !== null && this.impactTime > impactDuration) {
            this.impactTime = null;
          }

          if (this.groundPounding) {
            this.state = "groundpound";
          } else if (this.impactTime !== null) {
            this.state = "groundpoundimpact";
          } else if (this.wallSliding) {
            this.airTime = (this.airTime ?? 0) + dt;
            this.state = "wallslide";
          } else if (this.dragging && !this.carrying && !this.ball) {
            this.state = "throw";
          } else if (!this.grounded) {
            this.airTime = (this.airTime ?? 0) + dt;
            this.state = this.yv < 0 ? "jump" : "fall";
          } else {
            this.airTime = 0;
            this.state = Math.abs(this.xv) > 0.5 ? "run" : "idle";
          }

          const physEvents = this.groundPounding
            ? { ...events, KeyW: false, KeyA: false, KeyD: false }
            : events;

          //start physics
          super.tick(dt, physEvents);

          if (this.ball && this.carrying) {
            this.ball.xv = 0;
            this.ball.yv = 0;
            //this.ball.x = this.x + this.w / 2 - this.ball.w / 2 + 0.05;
            this.ball.x = this.x + this.w / 2 - this.ball.w / 2;
            this.ball.y = this.y - 0.55;
            this.ball.room = this.room;
            this.ball.updateHitbox();
          }

          this._wasGrounded = this.grounded;

          if (this.engine.infinalfight) {
            if (
              this.room.entities.filter((obj) => obj instanceof MEnemy)
                .length == 0
            ) {
              // stop speedrun timer
              this.engine.tstp = true;
              this.engine.infinalfight = false;
            }
          }
        }

        /** Renders the thing
         *
         * @param {CanvasRenderingContext2D} ctx
         * @param {MCamera} camera
         * @param {number} t
         * @param {number} pixel
         * @returns {void}
         */
        render(ctx, camera, t, pixel) {
          //so the hat can bob essentially
          const _spr = this.texturer(t, this);
          const _offsetY = (this.h * camera.tsz - _spr.h * pixel) / 2;
          this._hatY = camera.worldToScreen(this.x, this.y).y + _offsetY;

          super.render(ctx, camera, t, pixel);

          this.engine?.onRenderHat?.(ctx, this, pixel, camera);

          if (this.ball?.room == this.room)
            this.ball?.render?.(ctx, camera, t, pixel);
          if (this.dragging) {
            const ballCx = this.ball
              ? this.ball.x + this.ball.w / 2
              : this.x + this.w / 2;
            const ballCy = this.ball
              ? this.ball.y + this.ball.h / 2
              : this.y + this.h / 2;
            const { x, y } = camera.worldToScreen(ballCx, ballCy);
            let dx = this.dragX - this.dragInitX;
            let dy = this.dragY - this.dragInitY;
            const maxDrag = this.maxDrag;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len > maxDrag) {
              dx = (dx / len) * maxDrag;
              dy = (dy / len) * maxDrag;
            }
            aim(ctx, x, y, dx, dy, pixel, 20, 5, t * 100);
          }
        }

        data() {
          return {
            x: this.x,
            y: this.y,
            sx: this.sx,
            sy: this.sy,
            xv: this.xv,
            yv: this.yv,
            roomrow: this.room.row,
            roomcol: this.room.col,
            powers: this.powers,
            ball: this.ball?.data() ?? null,
            carrying: this.carrying,
          };
        }

        static fromData(data) {
          const p = new MPlayer(data.x, data.y, 0.8, 1.4, playerTexturer);
          p.x = data.x;
          p.y = data.y;
          p.sx = data.sx;
          p.sy = data.sy;
          p.xv = data.xv;
          p.yv = data.yv;
          p.room = this.engine.world.rooms[data.roomrow][data.roomcol];
          p.powers = data.powers;
          p.ball = MBall.fromData(data.ball, this);
          return p;
        }
      }

      /** base class for all enemies extend this with `extends MEnemy`.
       *  AI subclasses signal movement via _moveLeft / _moveRight / _jumpQueued
       *  flags set inside ai(dt), which are consumed each physics tick.
       */
      class MEnemy extends MEntity {
        static deathAnimationTime = 1;

        /**
         * @param {number} x
         * @param {number} y
         * @param {number} w
         * @param {number} h
         * @param {number} maxHealth
         * @param {(number, MEnemy) => SpriteRef} texturer
         */
        constructor(x, y, w, h, maxHealth, texturer) {
          super(x, y, w, h, maxHealth, texturer);
          this.state = "idle";
          this.facing = 1;
          this.dead = false;
          this.stateTime = 0;

          //physics intent flags set in ai(), consumed in tick()
          this._moveLeft = false;
          this._moveRight = false;
          this._jumpQueued = false;

          this._path = null;
          this._pathTimer = 0;
          this._pathStuck = 0;

          /* how close before chasing, how far before giving up.
            Subclasses can override these. Without defaults here enemies
            never aggro because dist <= undefined is always false */
          this.aggroRange = this.aggroRange ?? 12;
          this.deAggroRange = this.deAggroRange ?? 18;

          //patrol state
          this.patrolDir = 1;
          this.stallTimer = 0;
          this.jumpCooldown = 0;
          this.chaseMode = false;

          // death
          this._deathTimer = 0;
          this._hitFlash = 0;
        }

        /** Override in subclasses to implement AI behaviour.
         *  Set this._moveLeft / _moveRight / _jumpQueued as needed.
         * @param {number} dt
         */
        ai(dt) {
          const dist = this._playerDist();

          if (!this.chaseMode && dist <= this.aggroRange) this.chaseMode = true;
          if (this.chaseMode && dist > this.deAggroRange)
            this.chaseMode = false;

          if (this.chaseMode) {
            this._updatePath(dt, 0.5);

            if (this._path?.length) {
              this._followPath(dt);
            } else {
              // const hDir = this._playerHDir();
              // if (hDir ===  1) this._moveRight = true;
              // if (hDir === -1) this._moveLeft = true;
              // this.facing = hDir || this.facing;
              const hDir = this._playerHDir();
              if (hDir === 1) this._moveRight = true;
              if (hDir === -1) this._moveLeft = true;
              const newFacing1 = hDir || this.facing;
              if (newFacing1 !== this.facing) {
                this.facing = newFacing1;
                this._facingLock = 0.2;
              } else this.facing = newFacing1;
            }
          } else {
            if (this.patrolDir === 1) this._moveRight = true;
            else this._moveLeft = true;
            if (this.patrolDir !== this.facing) {
              this.facing = this.patrolDir;
              this._facingLock = 0.2;
            }

            if (this.grounded && Math.abs(this.xv) < 0.15) {
              this.stallTimer += dt;
              if (this.stallTimer > 0.25) {
                this.patrolDir *= -1;
                //cooldown before it can stall-flip again
                this.stallTimer = -0.4;
              }
            } else {
              this.stallTimer = 0;
            }

            this.jumpCooldown -= dt;
            if (this.grounded && this.jumpCooldown <= 0) {
              this._jumpQueued = true;
              this.jumpCooldown = 1.5 + Math.random() * 2;
            }
          }

          this.state = this.grounded ? "idle" : "jump";
        }

        /** Returns signed horizontal distance to player (positive = player is right). */
        _playerDX() {
          const p = this.engine?.player;
          if (!p) return 0;
          return p.x + p.w / 2 - (this.x + this.w / 2);
        }

        /** Returns signed vertical distance to player (positive = player is below). */
        _playerDY() {
          const p = this.engine?.player;
          if (!p) return 0;
          return p.y + p.h / 2 - (this.y + this.h / 2);
        }

        /** Returns Euclidean distance to player. */
        _playerDist() {
          const p = this.engine?.player;
          if (!p) return Infinity;
          //so if in a differant room they ignore the player (patrol mode kinda)
          if (p.room !== this.room) return Infinity;
          const dx = this._playerDX(),
            dy = this._playerDY();
          return Math.sqrt(dx * dx + dy * dy);
        }

        /** Returns true if player is within `range` world units. */
        _playerInRange(range) {
          return this._playerDist() <= range;
        }

        /** Returns -1 / 0 / 1: which horizontal direction the player is in. */
        _playerHDir() {
          const dx = this._playerDX();
          return dx === 0 ? 0 : dx > 0 ? 1 : -1;
        }

        /**
         * Requests a fresh path to the player via the engine's graph.
         * it has interval to keep it fast
         * @param {number} dt
         * @param {number} [interval=0.5]
         */
        _updatePath(dt, interval = 0.5) {
          this._pathTimer -= dt;
          if (this._pathTimer > 0) return;
          this._pathTimer = interval;

          const p = this.engine?.player;
          const g = this.room?.graph ?? this.engine?.graph;
          if (!p || !g) return;

          //centering is better
          this._path = g.findPath(
            this.x + this.w / 2,
            this.y + this.h,
            p.x + p.w / 2,
            p.y + p.h,
          );
        }

        /**
         * Follows the current path one step at a time.
         * Sets _moveLeft / _moveRight / _jumpQueued so MEntity.tick() handles physics.
         * @param {number} dt
         */
        _followPath(dt) {
          //screw comments

          if (!this._path?.length) return;

          const step = this._path[0];
          const targetX = step.c + 0.5;
          const myX = this.x + this.w / 2;
          const dx = targetX - myX;

          // if (Math.abs(dx) > 0.12) {
          //     if (dx > 0) this._moveRight = true;
          //     else this._moveLeft  = true;
          //     this.facing = dx > 0 ? 1 : -1;
          // }

          //new concept
          if (Math.abs(dx) > 0.12) {
            if (dx > 0) this._moveRight = true;
            else this._moveLeft = true;
            //only commit facing for real movement
            if (Math.abs(dx) > 0.5) {
              //this.facing = dx > 0 ? 1 : -1;
              //another new concept
              const newFacing = dx > 0 ? 1 : -1;
              if (newFacing !== this.facing) {
                this.facing = newFacing;
                this._facingLock = 0.2;
              }
            }
          }

          if (step.jump) {
            if (this.grounded) {
              const wallBlocked =
                Math.abs(this.xv) < 0.15 && Math.abs(dx) > 0.3;
              if (Math.abs(dx) < 1.5 || wallBlocked) {
                this._jumpQueued = true;
              }
            }
            if (!this.grounded) {
              this._path.shift();
              this._pathStuck = 0;
            }
            return;
          }

          if (this.grounded && Math.abs(this.xv) < 0.1 && Math.abs(dx) > 0.4) {
            this._pathStuck += dt;
            if (this._pathStuck > 0.4) {
              this._path.shift();
              this._pathStuck = 0;
            }
          } else {
            this._pathStuck = 0;
          }

          if (Math.abs(dx) < 0.35) {
            this._path.shift();
            this._pathStuck = 0;
          }
        }

        _separateFromEnemies() {
          // const room = this.room;
          // const world = this.engine?.world;
          // if (!room || !world) return;
          // for (const z of room.indices) {
          //     for (const obj of room.zia[z]) {
          //         if (obj === this || !(obj instanceof MEnemy) || obj.dead) continue;
          //         const overlapX = (this.x + this.w / 2) - (obj.x + obj.w / 2);
          //         const overlapY = (this.y + this.h / 2) - (obj.y + obj.h / 2);
          //         const minDistX = (this.w + obj.w) / 2;
          //         const minDistY = (this.h + obj.h) / 2;
          //         const absX = Math.abs(overlapX);
          //         const absY = Math.abs(overlapY);
          //         if (absX < minDistX && absY < minDistY) {
          //             const push = (minDistX - absX) / 2;
          //             const prevX = this.x;
          //             this.x += overlapX > 0 ? push : -push;
          //             this.updateHitbox();
          //             if (this.touching(MSolid, world)) {
          //                 this.x = prevX;
          //                 this.updateHitbox();
          //             }const prevObjX = obj.x;
          //             obj.x += overlapX > 0 ? -push : push;
          //             obj.updateHitbox();
          //             if (obj.touching(MSolid, world)) {
          //                 obj.x = prevObjX;
          //                 obj.updateHitbox();
          //             }
          //         }
          //     }
          // }
        }

        /** @param {number} dt */
        tick(dt) {
          if (this.dead) {
            this._deathTimer += dt;
            super.tick(dt, {}, { hvel: this.moveSpeed ?? 4 });
            if (this._deathTimer > this.constructor.deathAnimationTime) {
              this.remove();
            }
            return;
          }

          if (this.contactCooldown > 0) this.contactCooldown -= dt;
          if (this._hitFlash > 0) this._hitFlash -= dt;

          this.stateTime += dt;
          this.ai(dt);

          const fakeEvents = {
            KeyA: this._moveLeft,
            KeyD: this._moveRight,
            KeyW: this._jumpQueued,
          };
          this._moveLeft = this._moveRight = this._jumpQueued = false;

          //physics first!
          super.tick(dt, fakeEvents, { hvel: this.moveSpeed ?? 4 });
          this._separateFromEnemies();

          //check for contact
          const player = this.engine?.player;
          if (
            player &&
            player.room === this.room &&
            this.contactCooldown <= 0
          ) {
            //update both (certainty check)
            this.updateHitbox();
            player.updateHitbox();

            if (this.hbox.collision(player.hbox)) {
              this.onPlayerContact(player);
              this.contactCooldown = 0.6;
            }
          }
        }

        /** Called every frame the enemy overlaps the player
         * The idea here is to make sure that the player can jump off enemies but still take damage per touch.
         * @param {MPlayer} player
         */
        onPlayerContact(player) {
          if (!player.groundPounding) {
            const dy = player.y + player.h / 2 - (this.y + this.h / 2);

            //player standing on enemy
            //if (dy < -0.1 && player.yv >= 0) return;

            const dx = player.x + player.w / 2 - (this.x + this.w / 2);
            player.xv = Math.sign(dx || 1) * 15;
            player.yv = -10;
            player.takeDamage(20);
          }
        }

        /** @param {number} amount */
        takeDamage(amount) {
          this._hitFlash = 0.12;
          this.health -= amount;
          if (this.health <= 0) this.die();
        }

        die() {
          if (this.dead) return;
          this.dead = true;
          this._deathTimer = 0;
        }

        deathAlpha(ctx) {
          ctx.globalAlpha =
            1 -
            this._deathTimer /
              (this.constructor.deathAnimationTime ??
                MEnemy.deathAnimationTime);
        }

        render(ctx, camera, t, pixel) {
          ctx.save();
          this.deathAlpha(ctx);
          super.render(ctx, camera, t, pixel);
          ctx.restore();
        }
      }

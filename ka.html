            const equipped = player.equippedHat ?? "";
            const ownedStr = (player._ownedHats ?? []).slice().sort().join(",");
            const stateKey = `${pts}|${equipped}|${ownedStr}`;

            if (this._lastStateKey !== stateKey) {
              this._lastStateKey = stateKey;
              const owned = player._ownedHats ?? [];

              const rows = MHatShop.HATS.map((hat) => {
                const isOwned = owned.includes(hat.key);
                const isEquipped = player.equippedHat === hat.key;
                const canAfford = pts >= hat.cost;

                const btn = isOwned
                  ? `<button class="hat-btn ${isEquipped ? "hat-btn-equipped" : ""}"
                                    data-action="equip" data-key="${hat.key}">
                                ${isEquipped ? "Equipped" : "Equip"}
                            </button>`
                  : `<button class="hat-btn" ${canAfford ? "" : "disabled"}
                                    data-action="buy" data-key="${hat.key}" data-cost="${hat.cost}">
                                Buy — ${hat.cost}
                            </button>`;

                return `<div class="hat-row ${isEquipped ? "hat-row-equipped" : ""}">
                            <span class="hat-name">${hat.name}</span>${btn}
                        </div>`;
              }).join("");

              const unequipRow = player.equippedHat
                ? `<div class="hat-row">
                            <span class="hat-name"><i>none</i></span>
                            <button class="hat-btn" data-action="unequip">Unequip</button>
                        </div>`
                : "";

              this._shopEl.innerHTML = `
                        <div class="hat-shop-title">Hat Shop</div>d d
                        <div class="hat-shop-pts"> <b>${pts}</b> hat point${pts !== 1 ? "s" : ""}</div>
                        <div class="hat-shop-list">${rows}${unequipRow}</div>
                        <div class="hat-shop-hint">[SPACE] to close</div>
                    `;
            }
          } else {
            this._lastStateKey = null;
            this._shopEl.style.display = "none";
            if (this.inRange) {
              this._prompt.style.left = `${sx}px`;
              this._prompt.style.top = `${sy - 4}px`;
              this._prompt.style.display = "block";
            } else {
              this._prompt.style.display = "none";
            }
          }
        }

        destroy() {
          this._shopEl?.remove();
          this._prompt?.remove();
        }
      }

      class MBackground {
        constructor(spriteKey) {
          this.spriteKey = spriteKey;
          this._sprite = null;
        }

        _getSprite() {
          if (!this._sprite) {
            this._sprite = gfx.props.backdrops[this.spriteKey];
          }
          return this._sprite;
        }

        render(ctx, camera, room) {
          const sprite = this._getSprite();
          if (!sprite) return;

          const { x, y } = camera.worldToScreen(0, 0);
          const scaleX = (room.width * camera.tsz) / sprite[0].length;
          const scaleY = (room.height * camera.tsz) / sprite.length;

          ctx.save();
          ctx.imageSmoothingEnabled = false;
          ctx.translate(x, y);
          ctx.scale(scaleX, scaleY);
          sprite.draw?.(ctx, 0, 0, 1);
          ctx.restore();
        }
      }

      class MEnvironment extends MDecorative {
        static nameToData = {
          bush1: [1, 1, () => gfx.props.environment.bush1[0]],
          bush2: [2, 1, () => gfx.props.environment.bush2[0]],
          bush3: [2, 2, () => gfx.props.environment.bush3[0]],
          grass1: [1, 1, () => gfx.props.environment.grass1],
          grass2: [1, 1, () => gfx.props.environment.grass2],
          rock1: [1, 1, () => gfx.props.environment.rock1],
          rock2: [2, 1, () => gfx.props.environment.rock2],
          rock3: [2, 2, () => gfx.props.environment.rock3],
          mushroom1: [1, 1, () => gfx.props.environment.mushroom1],
        };

        constructor(x, y, name) {
          let offset =
            name == "bush3"
              ? -0.55
              : name == "rock1"
                ? +0.3
                : name == "rock3"
                  ? -0.1
                  : name == "grass1" || name == "grass2"
                    ? 0.45
                    : name == "mushroom1"
                      ? 0.35
                      : 0;
          super(x, y + offset, ...MEnvironment.nameToData[name]);
        }
      }

      /**
       * MPacman
       */
      class MPacman extends MBoss {
        //tune any of this if you want
        static deathAnimationTime = 3.0;
        static BOUNCE = 0.68;
        static AIR_ACCEL = 12;
        static MAX_SPEED = 10;
        static DIVE_SPEED = 34;
        static PREDICT_TIME = 2.2;
        static PREDICT_THRESH = 4.0;
        static CHOMP_PAUSE = 0.12;
        static LICK_DURATION = 2.8;
        static DIVE_COOLDOWN = 2.0;
        static JUMP_MULT = 1.35;
        static JUMP_CD_MIN = 0.6;
        static JUMP_CD_MAX = 1.3;
        static CHARGE_CD_MIN = 2.5;
        static CHARGE_CD_MAX = 4.5;
        static CHARGE_AIR_DELAY = 0.35;

        //construct it
        constructor(x, y, name) {
          const W = 8,
            H = 8;

          super(x, y, W, H, 480, (t, self) => {
            if (self._hitFlash > 0) return gfx.enemies.bosses.landlord.idle[0];

            switch (self._pstate) {
              //sluuurrrrrpppppppppp
              case "licking": {
                const frames = gfx.enemies.bosses.landlord.lick;
                const fi = Math.min(
                  frames.length - 1,
                  Math.floor(
                    (self._lickTimer / MPacman.LICK_DURATION) * frames.length,
                  ),
                );
                return frames[fi];
              }
              case "chomping":
              case "diving": {
                const frames = gfx.enemies.bosses.landlord.nomnom;
                return frames[Math.floor(t * 12) % frames.length];
              }
              default: {
                const frames = gfx.enemies.bosses.landlord.idle;
                return frames[Math.floor(t * 2) % frames.length];
              }
            }
          });

          //im rolling rn
          this._pstate = "rolling";

          this._angle = 0;
          this._lickTimer = 0;
          this._chompTimer = 0;
          this._diveCooldown = 0;
          this._jumpCooldown = 0.4 + Math.random() * 0.4;
          this._chargeCooldown =
            MPacman.CHARGE_CD_MIN +
            Math.random() * (MPacman.CHARGE_CD_MAX - MPacman.CHARGE_CD_MIN);
          this._chargingDive = false;
          this._chargeAirTimer = 0;
          this._wasGrounded = false;
          this.contactCooldown = 0;

          this._origRenderPlayer = null;
          this._prevPlayerHealth = null;

          this.xv = (Math.random() < 0.5 ? 1 : -1) * 5;
          this.yv = -4;

          this.name = name;
        }

        //supress parent ai
        ai(_dt) {}

        //tick tock
        tick(dt) {
          const player = this.engine?.player;
          const renderer = this.engine?.renderer;
          if (this._origRenderPlayer && renderer) {
            renderer.renderPlayer = this._origRenderPlayer;
            this._origRenderPlayer = null;
          }

          if (this.dead) {
            this._deathTimer += dt;
            if (this._deathTimer > MPacman.deathAnimationTime) this.remove();
            return;
          }

          if (this._hitFlash > 0) this._hitFlash -= dt;
          if (this._diveCooldown > 0) this._diveCooldown -= dt;
          if (this.contactCooldown > 0) this.contactCooldown -= dt;
          if (
            player &&
            (this._pstate === "chomping" || this._pstate === "licking")
          ) {
            if (player.room !== this.room) player.room = this.room;
          }
          if (player?.room !== this.room) return;
          if (
            this._prevPlayerHealth !== null &&
            this._prevPlayerHealth < player.maxHealth &&
            player.health >= player.maxHealth
          ) {
            this.health = this.maxHealth;
            this.room.entities = this.room.entities.filter(
              (obj) => !(obj instanceof MEnemy) || obj instanceof MPacman,
            );
            this._hitFlash = 0;
            if (this._pstate === "chomping" || this._pstate === "licking") {
              this._pstate = "rolling";
              this._diveCooldown = MPacman.DIVE_COOLDOWN;
              this._chargingDive = false;
              this._jumpCooldown = 0.5;
            }
          }
          this._prevPlayerHealth = player.health;

          const world = this.engine.world;

          switch (this._pstate) {
            case "rolling":
              this._tickRolling(dt, player, world);
              break;
            case "diving":
              this._tickDiving(dt, player, world);
              break;
            case "chomping":
              this._tickChomping(dt, player, world);
              break;
            case "licking":
              this._tickLicking(dt, player, world);
              break;
          }

          this._angle += (this.xv / (this.w * 0.5)) * dt;
          if (this.xv > 0.5) this.facing = 1;
          else if (this.xv < -0.5) this.facing = -1;
        }

        //rolling rn
        _tickRolling(dt, player, world) {
          const g = this.engine.gravity;

          if (this.grounded) {
            this._chargingDive = false;
            this._chargeAirTimer = 0;
            this._chargeCooldown -= dt;
            this._jumpCooldown -= dt;

            if (this._chargeCooldown <= 0) {
              this._doChargeJump(player);
            } else if (this._jumpCooldown <= 0) {
              this._doJump(player);
            }
          }

          if (
            this._diveCooldown <= 0 &&
            !this._chargingDive &&
            this._checkDive(player)
          ) {
            this._launchDive(player);
            return;
          }

          if (this._chargingDive && !this.grounded) {
            this._chargeAirTimer += dt;
            if (
              this._chargeAirTimer >= MPacman.CHARGE_AIR_DELAY &&
              this._diveCooldown <= 0
            ) {
              this._chargingDive = false;
              this._launchDive(player);
              return;
            }
          }

          if (!this.grounded) {
            const dx = player.x + player.w / 2 - (this.x + this.w / 2);
            this.xv += Math.sign(dx) * MPacman.AIR_ACCEL * dt;
            this.xv = Math.max(
              -MPacman.MAX_SPEED,
              Math.min(MPacman.MAX_SPEED, this.xv),
            );
          }

          //horizontal and wall bounce.
          this.x += this.xv * dt;
          this.transport();
          this.updateHitbox();
          if (this.touching(MSolid, world)) {
            this.x -= this.xv * dt;
            this.xv *= -MPacman.BOUNCE;
            if (Math.abs(this.yv) < 4) {
              this.yv = -(
                this.engine.jump *
                MPacman.JUMP_MULT *
                (0.6 + Math.random() * 0.4)
              );
              this.grounded = false;
            }
            this.transport();
            this.updateHitbox();
          }

          //vertical and floor/ceiling bounce.
          this._wasGrounded = this.grounded;
          this.grounded = false;

          this.yv += g * dt;
          this.y += this.yv * dt;
          this.transport();
          this.updateHitbox();

          if (this.touching(MSolid, world)) {
            this.y -= this.yv * dt;
            if (this.yv > 0) {
              this.grounded = true;
              if (!this._wasGrounded) this._onLand();
              this.yv = Math.abs(this.yv) < 2 ? 0 : -this.yv * MPacman.BOUNCE;
            } else {
              this.yv *= -MPacman.BOUNCE;
            }
            this.transport();
            this.updateHitbox();
          }

          this._separateFromPlayer(player, world);
          this._checkPlayerContact(player);
        }

        //dive
        _tickDiving(dt, player, world) {
          this.yv += this.engine.gravity * 0.1 * dt;

          this.x += this.xv * dt;
          this.transport();
          this.updateHitbox();
          if (this.touching(MSolid, world)) {
            this.x -= this.xv * dt;
            this.xv *= -MPacman.BOUNCE;
            this._endDive();
            this.transport();
            this.updateHitbox();
            return;
          }

          this._wasGrounded = this.grounded;
          this.grounded = false;

          this.y += this.yv * dt;
          this.transport();
          this.updateHitbox();
          if (this.touching(MSolid, world)) {
            this.y -= this.yv * dt;
            if (this.yv > 0) {
              this.grounded = true;
              if (!this._wasGrounded) this._onLand();
            }
            this.yv *= -MPacman.BOUNCE;
            this._endDive();
            this.transport();
            this.updateHitbox();
            return;
          }

          player.updateHitbox();
          this.updateHitbox();
          if (this.hbox.collision(player.hbox)) {
            this._startChomp(player);
          }
        }

        //nom nom chomp chomp
        _tickChomping(dt, player, world) {
          this._chompTimer += dt;
          this.xv = 0;
          //boss still falls under gravityit shouldn't hang in mid-air.
          this._applyGravityAndFloor(dt, world);
          //pin player to boss centre after gravity has moved us.
          this._placePlayerInMouth(player);

          if (this._chompTimer >= MPacman.CHOMP_PAUSE) {
            this._pstate = "licking";
            this._lickTimer = 0;
          }
        }

        ///sluuuuuurrrrrrrrpppppppp
        _tickLicking(dt, player, world) {
          this._lickTimer += dt;
          this.xv = 0;
          this._applyGravityAndFloor(dt, world);
          this._placePlayerInMouth(player);

          if (this._lickTimer >= MPacman.LICK_DURATION) {
            this._pstate = "rolling";
            this._diveCooldown = MPacman.DIVE_COOLDOWN;
            this._chargeCooldown = 1.0;
            this._jumpCooldown = 0.3;
            player.health = 0;
          }
        }
        /**
         * Vertical-only physics used during eating so the boss falls and lands
         * normally without any horizontal sliding.
         */
        _applyGravityAndFloor(dt, world) {
          this._wasGrounded = this.grounded;
          this.grounded = false;

          this.yv += this.engine.gravity * dt;
          this.y += this.yv * dt;
          this.transport();
          this.updateHitbox();

          if (this.touching(MSolid, world)) {
            this.y -= this.yv * dt;
            if (this.yv > 0) {
              this.grounded = true;
              if (!this._wasGrounded) this._onLand();
              this.yv = 0;
            } else {
              this.yv *= -MPacman.BOUNCE;
            }
            this.transport();
            this.updateHitbox();
          }
        }
        /**
         * Locks the player to the boss's centre.
         * Also keeps player.room === this.room so renderScene iterates the correct
         * room and boss.render() always runs (which is what installs the no-op).
         */
        _placePlayerInMouth(player) {
          player.xv = 0;
          player.yv = 0;
          player.x = this.x + this.w / 2 - player.w / 2;
          player.y = this.y + this.h / 2 - player.h / 2;
          if (player.room !== this.room) player.room = this.room;
          player.updateHitbox();
          player.health = 1;
        }

        _doJump(player) {
          const dx = player.x + player.w / 2 - (this.x + this.w / 2);
          const targetX = Math.sign(dx) * MPacman.MAX_SPEED;
          this.xv = this.xv * 0.4 + targetX * 0.6;
          this.yv = -(this.engine.jump * MPacman.JUMP_MULT);
          this.grounded = false;
          this._jumpCooldown =
            MPacman.JUMP_CD_MIN +
            Math.random() * (MPacman.JUMP_CD_MAX - MPacman.JUMP_CD_MIN);
        }

        _doChargeJump(player) {
          const dx = player.x + player.w / 2 - (this.x + this.w / 2);
          this.xv = Math.sign(dx) * MPacman.MAX_SPEED * 1.1;
          this.yv = -(this.engine.jump * MPacman.JUMP_MULT * 1.15);
          this.grounded = false;
          this._chargingDive = true;
          this._chargeAirTimer = 0;
          this._jumpCooldown =
            MPacman.JUMP_CD_MIN +
            Math.random() * (MPacman.JUMP_CD_MAX - MPacman.JUMP_CD_MIN);
          this._chargeCooldown =
            MPacman.CHARGE_CD_MIN +
            Math.random() * (MPacman.CHARGE_CD_MAX - MPacman.CHARGE_CD_MIN);
        }

        _onLand() {
          this.engine.onGroundPound?.();
          this.engine.onGroundPound?.();
          this.engine.onGroundPound?.();
        }

        _checkDive(player) {
          if (Math.abs(this.xv) < 2) return false;
          const myX = this.x + this.w / 2,
            myY = this.y + this.h / 2;
          const px = player.x + player.w / 2,
            py = player.y + player.h / 2;
          const dx = px - myX;
          if (Math.sign(this.xv) !== Math.sign(dx)) return false;
          const t = dx / this.xv;
          if (t < 0.15 || t > MPacman.PREDICT_TIME) return false;
          const predY = myY + this.yv * t + 0.5 * this.engine.gravity * t * t;
          return Math.abs(predY - py) <= MPacman.PREDICT_THRESH;
        }

        _launchDive(player) {
          this._pstate = "diving";
          const myX = this.x + this.w / 2,
            myY = this.y + this.h / 2;
          const px = player.x + player.w / 2,
            py = player.y + player.h / 2;
          const len = Math.hypot(px - myX, py - myY) || 1;
          this.xv = ((px - myX) / len) * MPacman.DIVE_SPEED;
          this.yv = ((py - myY) / len) * MPacman.DIVE_SPEED;
        }

        _endDive() {
          this._pstate = "rolling";
          this._diveCooldown = MPacman.DIVE_COOLDOWN;
          this._chargingDive = false;
          this._chargeAirTimer = 0;
        }

        _startChomp(player) {
          this._pstate = "chomping";
          this._chompTimer = 0;
          player.health = 1;
          player._hitFlash = 0.9;
          this._onLand();
        }

        _separateFromPlayer(player, world) {
          if (!player || player.room !== this.room || player.dead) return;

          const overlapX = player.x + player.w / 2 - (this.x + this.w / 2);
          const overlapY = player.y + player.h / 2 - (this.y + this.h / 2);
          const minDistX = (player.w + this.w) / 2;
          const minDistY = (player.h + this.h) / 2;
          const absX = Math.abs(overlapX);
          const absY = Math.abs(overlapY);

          if (absX >= minDistX || absY >= minDistY) return;

          if (minDistX - absX < minDistY - absY) {
            const push = minDistX - absX;
            const prevX = player.x;
            player.x += overlapX > 0 ? push : -push;
            player.updateHitbox();
            if (player.touching(MSolid, world)) {
              player.x = prevX;
              player.updateHitbox();
              this.x -= overlapX > 0 ? push : -push;
              this.xv *= -0.5;
              this.updateHitbox();
            }
          } else {
            const push = minDistY - absY;
            if (overlapY < 0) {
              const prevY = player.y;
              player.y -= push;
              player.yv = Math.min(player.yv, 0);
              player.grounded = true;
              player.updateHitbox();
              if (player.touching(MSolid, world)) {
                player.y = prevY;
                player.updateHitbox();
              }
            } else {
              const prevY = player.y;
              player.y += push;
              player.updateHitbox();
              if (player.touching(MSolid, world)) {
                player.y = prevY;
                player.updateHitbox();
              }
            }
          }
        }

        _checkPlayerContact(player) {
          if (
            !player ||
            player.room !== this.room ||
            this.contactCooldown > 0 ||
            player.groundPounding
          )
            return;
          player.updateHitbox();
          this.updateHitbox();
          if (!this.hbox.collision(player.hbox)) return;

          const dx = player.x + player.w / 2 - (this.x + this.w / 2);
          player.xv = Math.sign(dx || 1) * 22;
          player.yv = -16;
          player.takeDamage(20);
          this.contactCooldown = 0.7;
        }

        //dammage and death
        takeDamage(amount, source) {
          if (
            this.dead ||
            this._pstate == "chomping" ||
            this._pstate == "licking" ||
            (source == "groundpound" && this.health <= this.maxHealth / 2)
          )
            return;
          const prevHealth = this.health;
          this._hitFlash = 0.15;
          this.health -= amount;
          if (
            prevHealth > this.maxHealth / 2 &&
            this.health <= this.maxHealth / 2
          ) {
            const w = this.room.width;
            const h = this.room.height;
            this.engine.world.addEntity(this.room, new MMimic(w / 3, h / 3));
            this.engine.world.addEntity(
              this.room,
              new MMimic((w * 2) / 3, h / 3),
            );
            this.engine.world.addEntity(
              this.room,
              new MSwarmer(w / 3, h / 2, 4),
            );
            this.engine.world.addEntity(
              this.room,
              new MSwarmer((w * 2) / 3, h / 2, 4),
            );
          }
          if (this.health <= 0) this.die();
        }

        render(ctx, camera, t, pixel) {
          if (!camera.inView(this)) return;

          const { x: sx, y: sy } = camera.worldToScreen(this.x, this.y);
          const bw = this.w * camera.tsz;
          const bh = this.h * camera.tsz;
          const cx = sx + bw / 2;
          const cy = sy + bh / 2;
          const radius = bw / 2;

          ctx.save();
          this.deathAlpha(ctx);

          if (this._hitFlash > 0) {
            ctx.globalAlpha *=
              0.3 + Math.abs(Math.sin(this._hitFlash * 35)) * 0.7;
          }

          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.clip();

          const sprite = this.texturer(t, this);
          const sw = sprite.w * pixel;
          const sh = sprite.h * pixel;

          ctx.translate(cx, cy);
          if (this._pstate === "rolling") ctx.rotate(this._angle);
          sprite.draw(ctx, -sw / 2, -sh / 2, pixel, this.facing ?? 1);
          if (this._pstate === "chomping" || this._pstate === "licking") {
            const player = this.engine?.player;
            if (player) {
              const pSprite = player.texturer(t, player);
              const psw = pSprite.w * pixel;
              const psh = pSprite.h * pixel;
              pSprite.draw(
                ctx,
                -psw / 2,
                -psh / 2 + pixel * 2,
                pixel,
                player.facing ?? 1,
              );
              const renderer = this.engine.renderer;
              if (renderer && !this._origRenderPlayer) {
                this._origRenderPlayer = renderer.renderPlayer.bind(renderer);
              }
              if (renderer) renderer.renderPlayer = () => {};
            }
          }

          ctx.restore();
        }

        data() {
          return {
            x: this.x,
            y: this.y,
            sx: this.sx,
            sy: this.sy,
            xv: this.xv,
            yv: this.yv,
            roomrow: this.room.row,
            roomcol: this.room.col,
            _pstate: this._pstate,
            _angle: this._angle,
            _lickTimer: this._lickTimer,
            _chompTimer: this._chompTimer,
            _diveCooldown: this._diveCooldown,
            _jumpCooldown: this._jumpCooldown,
            _chargingDive: this._chargingDive,
            _chargeAirTimer: this._chargeAirTimer,
            contactCooldown: this.contactCooldown,
          };
        }

        static fromData(data) {
          const w = new MMimic(data.x, data.y);
          w.sx = data.sx;
          w.sy = data.sy;
          w.xv = data.xv;
          w.yv = data.yv;
          w.room = this.engine.world.rooms[data.roomrow][data.roomcol];
          w._pstate = data._pstate;
          w._angle = data._angle;
          w._lickTimer = data._lickTimer;
          w._chompTimer = data._chompTimer;
          w._diveCooldown = data._diveCooldown;
          w._jumpCooldown = data._jumpCooldown;

  <script type>
    const events = { mouseX: 0, mouseY: 0, Mouse: false };
    const eventsPrev = Object.assign({}, events);

    // When key down, mark it as true
    document.addEventListener("keydown", (e) => {
      events[e.code] = true;
      // Shift shortcut
      events.Shift = events.ShiftLeft || events.ShiftRight;
    });

    // Similar to above
    document.addEventListener("keyup", (e) => {
      events[e.code] = false;
      events.Shift = events.ShiftLeft || events.ShiftRight;
    });

    document.addEventListener("mousedown", (e) => {
      events.Mouse = true;
    });

    document.addEventListener("mouseup", (e) => {
      events.Mouse = false;
    });

    document.addEventListener("mousemove", (e) => {
      events.MouseX = e.clientX;
      events.MouseY = e.clientY;
    });

    class AudioBuffer {
      /* 
                Created by Arrow
                Docs: https://www.khanacademy.org/computer-programming/ka-music-player/5424847674523648
            */
      constructor() {
        this.audioContext = new (
          window.AudioContext || window.webkitAudioContext
        )();
        this.source = null;
        this.buffer = null;
        this.gainNode = this.audioContext.createGain();
        this.gainNode.connect(this.audioContext.destination);
      }

      async setBase64String(audioBufferString) {
        this.audioBufferString = audioBufferString;
        await this._initializeBuffer();
      }

      async _initializeBuffer() {
        const binaryString = atob(this.audioBufferString.split(",")[1]);
        const bytes = Uint8Array.from(binaryString, (char) =>
          char.charCodeAt(0),
        );
        this.buffer = await this.audioContext.decodeAudioData(bytes.buffer);
      }

      _createSource() {
        this.source = this.audioContext.createBufferSource();
        this.source.buffer = this.buffer;
        this.source.connect(this.gainNode);
        //loop!
        this.source.loop = true;
      }

      play() {
        if (this.audioContext.state === "suspended") {
          this.audioContext.resume();
        }
        if (!this.source) {
          this._createSource();
          this.source.start(0);
        }
      }

      pause() {
        if (this.source) {
          this.source.stop();
          this.source = null;
        }
      }

      setVolume(volume) {
        this.gainNode.gain.value = volume;
      }
    }

    function toDataURI(str) {
      if (str.startsWith("data:")) return str;
      return "data:audio/mpeg;base64," + str;

      const wasAirborne =

      const justLanded =
        wasAirborne && (player.state === "idle" || player.state === "run");

        const vol = Math.min(
          1.0,
          Math.max(0.0, (_prevPreTickYv - minYv) / (maxYv - minYv)),
        );
        if (vol > 0) {
          impactAudio.setVolume(vol * 0.25);
          impactAudio.pause();
          impactAudio.play();

      if (justJumped && jumpAudio && !isMuted) {

        jumpAudio.play();

      _prevPlayerState = player.state;
      _prevPreTickYv = preTickYv;

      const { x, y } = camera.worldToScreen(0, 0);
      const scaleX = camera.tsz / bgSprite.w;
      const scaleY = camera.tsz / bgSprite.h;
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.translate(x, y);

    class Shake {
      constructor(n) {

        shake.y = (Math.random() * 2 - 1) * this.n;

    class RoomTransition {
      constructor() {
        this.snap = document.createElement("canvas");
        this.snapNew = document.createElement("canvas");
        this.oldTsz = 0;
        this.newTsz = 0;
        this.newCaptured = false;
        this.active = false;
        this.dir = null;
        this.progress = 0;
        this.elapsed = 0;
        this.duration = 0.3;
      }

      capture(sourceCanvas, engine) {
        this.snap.width = sourceCanvas.width;
        this.snap.height = sourceCanvas.height;
        this.snap.getContext("2d").drawImage(sourceCanvas, 0, 0);
        this.oldTsz = engine.renderer.camera.tsz;
      }

      captureNew(sourceCanvas, engine) {
        this.snapNew.width = sourceCanvas.width;
        this.snapNew.height = sourceCanvas.height;
        this.snapNew.getContext("2d").drawImage(sourceCanvas, 0, 0);
        this.newTsz = engine.renderer.camera.tsz;
        this.newCaptured = true;
      }

      start(dir) {
        this.active = true;
        this.dir = dir;
        this.elapsed = 0;
        this.progress = 0;
        this.newCaptured = false;
      }

      tick(dt) {
        if (!this.active) return;
        this.elapsed += dt;
        this.progress = Math.min(this.elapsed / this.duration, 1);
        if (this.progress >= 1) this.active = false;
      }

      //cubic ease-out instead of lerp because I can and it flows nicer
      get eased() {
        return 1 - Math.pow(1 - this.progress, 3);
      }

      //where the new room starts (off-screen) and slides to (0,0)
      getNewOffset(canvasW, canvasH, scale) {
        const p = this.eased;
        switch (this.dir) {
          case "right":
            return { x: effectiveWidth * (1 - p), y: 0 };
          case "left":
            return {
              x: effectiveWidth * p - canvasW * scale,
              y: 0,
            };
          case "bottom":
            return { x: 0, y: effectiveHeight * (1 - p) };
          case "top":
            return {
              x: 0,
              y: effectiveHeight * p - canvasH * scale,
            };
        }
        return { x: 0, y: 0 };
      }

      //where the old room slides to (away from 0,0)
      getOldOffset(canvasW, canvasH, scale) {
        const p = this.eased;
        switch (this.dir) {
          case "right":
            return {
              x: effectiveWidth * (1 - p) - canvasW * scale,
              y: 0,
            };
          case "left":
            return { x: effectiveWidth * p, y: 0 };
          case "bottom":
            return {
              x: 0,
              y: effectiveHeight * (1 - p) - canvasH * scale,
            };
          case "top":
            return { x: 0, y: effectiveHeight * p };
        }
        return { x: 0, y: 0 };
      }

      get oldScale() {
        const p = this.eased;
        return lerp(this.oldTsz, this.newTsz, p) / this.oldTsz / dprVal;
      }

      get newScale() {
        const p = this.eased;
        return lerp(this.oldTsz, this.newTsz, p) / this.newTsz / dprVal;
      }

      drawOldRoom(ctx) {
        const scale = this.oldScale;
        const { x, y } = this.getOldOffset(
          this.snap.width,
          this.snap.height,
          scale,
        );
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.drawImage(this.snap, 0, 0);
        ctx.restore();
      }

      drawNewRoom(ctx) {
        const scale = this.newScale;
        const { x, y } = this.getNewOffset(
          this.snapNew.width,
          this.snapNew.height,
          scale,
        );
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.drawImage(this.snapNew, 0, 0);
        ctx.restore();
      }
    }

    /* 
            Okay, so this is very complicated, essentially the idea is to figure out where the top of the players head is
            The fastest way is just to do this manually, so here is Arrow showing his work

            A quick explanation:
            idle:frame 0: '-----.......----' at row 1
            idle:1: '-----.......----' 2
            idle:2: '-----.......----' 2

            The rest are abbreviated:
            run:frame 0: 1
            run:1: 2
            run:2: 1
            run:3: 2

            jump:frame 0: 1
            jump:1: 0
            jump:2: 0

            fall:0: 0
            fall:1: 1
            fall:2: 2

            groundpound frame 0: 0
            groundpound frames 1-4: 1

            groundpoundimpact: 1,1,1,1

            wallslide: 1

            throw:frame 0: 2
            throw:frames 1,1,1,1

            carryidle:frames 0-2: 2,2,2

            carryrun: frames 0-3: 2,2,2,2,

            carryjump:frame 0: 2
            carryjump:1: 2
            carryjump:2: 3

            carryfall:frame 0: 3
            carryfall:frames 1-2: 2,2,

            So we get
                idle: [1, 2, 2],
                run: [1, 2, 1, 2],
                jump: [1, 0, 0],
                fall: [0, 1, 2],
                groundpound: [0, 1, 1, 1, 1],
                groundpoundimpact: [1, 1, 1, 1],
                wallslide: [1],
                throw: [2, 1, 1, 1, 1],
                carryidle: [2, 2, 2],
                carryrun: [2, 2, 2, 2],
                carryjump: [2, 2, 3],
                carryfall: [3, 2, 2],
        */
    function renderPlayerHat(ctx, player, pixel, camera) {
      if (!player.equippedHat) return;
      const hatSprite = gfx.player.hats[player.equippedHat];
      if (!hatSprite) return;

      //perframe head-top row inside the sprite bitmap
      const HEAD_TOP_ROW = {
        idle: [1, 2, 2],
        run: [1, 2, 1, 2],
        jump: [1, 0, 0],
        fall: [0, 1, 2],
        groundpound: [0, 1, 1, 1, 1],
        groundpoundimpact: [1, 1, 1, 1],
        wallslide: [1],
        throw: [2, 1, 1, 1, 1],
        carryidle: [2, 2, 2],
        carryrun: [2, 2, 2, 2],
        carryjump: [2, 2, 3],
        carryfall: [3, 2, 2],
      };

      //mirror the texturer's sprite-state selection
      const state = player.state ?? "idle";
      const holding =
        player.ball &&
        (player.engine.slowMo || player.dragging || player.carrying);
      const carryMap = {
        idle: "carryidle",
        run: "carryrun",
        jump: "carryjump",
        fall: "carryfall",
      };
      const spriteState = holding && carryMap[state] ? carryMap[state] : state;

      //mirror the texturer's frame-index calculation
      const rows = HEAD_TOP_ROW[spriteState] ?? HEAD_TOP_ROW.idle;
      const fps = ANIM_FPS[state] ?? 6;
      const count = rows.length;
      let frame = 0;

      switch (state) {
        case "jump":
        case "fall":
          frame = Math.min(count - 1, Math.floor((player.airTime ?? 0) * fps));
          break;
        case "groundpound":
          frame = 0;
          break;
        case "groundpoundimpact":
          frame = Math.min(
            count - 1,
            Math.floor((player.impactTime ?? 0) * fps),
          );
          break;
        case "throw": {
          const dx = player.dragX - player.dragInitX;
          const dy = player.dragY - player.dragInitY;
          const len = Math.sqrt(dx * dx + dy * dy);
          frame = Math.floor(Math.min(len / player.maxDrag, 1) * (count - 1));
          break;
        }
        case "wallslide":
          frame = 0;
          break;
        default:
          frame = Math.floor(t * fps) % count;
      }
      frame = Math.max(0, Math.min(count - 1, frame));

      const headTopRow = rows[frame];

      const baseY = player._hatY ?? camera.worldToScreen(player.x, player.y).y;

      const { x } = camera.worldToScreen(player.x + player.w / 2, player.y);
      const hw = hatSprite.w * pixel;
      const hh = hatSprite.h * pixel;
      const hatDrawY = baseY + headTopRow * pixel - hh + pixel;

      ctx.save();
      ctx.imageSmoothingEnabled = false;
      //since I am not perfect I have to realign at the end
      const hatDrawX = x - hw / 2 - (player.facing === -1.8 ? pixel : 2);
      hatSprite.draw(ctx, hatDrawX, hatDrawY, pixel, player.facing ?? 1);
      ctx.restore();
    }

    const ANIM_FPS = {
      idle: 4,
      run: 8,
      jump: 12,
      fall: 8,
      groundpound: 10,
      groundpoundimpact: 10,
      throw: 12,
    };

    const tileMap = {
      "#": { type: MSolid, tileset: gfx.tiles.A },
      "@": { type: MDecorative, tileset: gfx.tiles.a },
      B: { type: MSolid, tileset: gfx.tiles.B },
      b: { type: MDecorative, tileset: gfx.tiles.b },
      "^": { type: MSolid, tileset: gfx.tiles.E },
      "=": { type: MSolid, tileset: gfx.tiles.F },
    };

    engine.world.init(roomTemplates, worldAssembly, tileMap);

    engine.createPlayer(5, 5, 0.8, 1.4, playerTexturer);

    engine.onRenderHat = (ctx, player, pixel, camera) =>
      renderPlayerHat(ctx, player, pixel, camera);

    engine._collectAnims = [];
    engine._hudFlash = {};

    //P stands for player lol
    // oh hey look arrow or someone used the technique i introduced! yay -xyzyyxx
    // labeling loops
    outer: for (let ri = 0; ri < engine.world.rooms.length; ri++) {
      for (let ci = 0; ci < engine.world.rooms[ri].length; ci++) {
        const room = engine.world.rooms[ri][ci];
        const key = worldAssembly[ri]?.[ci];
        const roomDef = roomTemplates[key];
        const bitmap = Array.isArray(roomDef) ? roomDef : roomDef?.bitmap;
        if (!bitmap) continue;
        for (let r = 0; r < bitmap.length; r++) {
          for (let c = 0; c < bitmap[r].length; c++) {
            if (bitmap[r][c] === "P") {
              engine.player.x = c;
              engine.player.y = r;
              engine.player.sx = c;
              engine.player.sy = r;
              engine.player.room = room;
              engine.player.sroom = room;
              engine.player.updateHitbox();
              break outer;
            }
          }
        }
      }
    }

    //const builder = new WorldBuilder(engine, 1, tileMap);
    //const world = new WorldManager(engine, roomTemplates, worldAssembly, builder);
    /*
        //for those of you who play clash royale -> heheheha
        world.onEnemySpawn = (type, x, y) => {
            if (type === 'E') { 
                engine.world.add(new MBlob(x, y, 'g2'), 1);

             }
            if (type === 'e') {

            if (type === 'K') {

        };*/

    MNPC.DEBUG_RADIUS = true;

    const roomTransition = new RoomTransition();
    engine.onRoomChange = (dir) => {
      if (dir === "top") engine._pendingUpBoost = true;
      if (roomTransition.active) return;

      //capture old room
      roomTransition.capture(canvas, engine);

      //pre-render new room (player.room is already the new room at this point)
      ctx.fillStyle = "rgb(20, 30, 20)";

      ctx.drawImage(roomTransition.snap, 0, 0);

      if (engine.player.room.soundtrack !== currentlyPlayingSoundtrack) {
        for (let i in soundtrackAudio) {
          soundtrackAudio[i].pause();
        }
        if (engine.player.room.soundtrack) {
          soundtrackAudio[engine.player.room.soundtrack].setVolume(1);

    /** HUD
     *
     * @param {CanvasRenderingContext2D} ctx
     * @param {MPlayer}  player
     * @param {number}   pixel - engine.renderer.pixel
     */
    function renderHUD(ctx, player, pixel, t) {
      //hearts
      const MAX_HEARTS = 10;
      const filledHearts = Math.ceil(
        (player.health / player.maxHealth) * MAX_HEARTS,
      );
      const heartSprite = gfx.player.heartFull;
      const heartW = heartSprite.w * pixel;
      const heartH = heartSprite.h * pixel;
      const gap = Math.round(pixel * 1.5);
      const marginX = Math.round(pixel * 2);
      const marginY = Math.round(pixel * 2);

      for (let i = 0; i < MAX_HEARTS; i++) {
        const sprite =
          i < filledHearts ? gfx.player.heartFull : gfx.player.heartEmpty;
        sprite.draw(
          ctx,
          marginX + i * (heartW + gap),
          effectiveHeight - marginY - sprite.h * pixel,
          pixel,
        );
      }

      // hat points counter
      const hatFrames = gfx.props.misc.hatPoint;
      const hatSprite = hatFrames[Math.floor(t * 6) % hatFrames.length];
      const hatW = hatSprite.w * pixel;
      const hatH = hatSprite.h * pixel;
      const hatX = width - hatW - Math.round(pixel * 3);
      const hatY = Math.round(pixel * 2);

      hatSprite.draw(ctx, hatX, hatY, pixel);

      ctx.save();
      ctx.font = `bold ${Math.round(pixel * 5)}px monospace`;
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(
        String(engine.hatPoints ?? 0),
        hatX - Math.round(pixel * 1.5),
        hatY + hatH / 2,
      );
      ctx.restore();

      //power icons
      const powerOrder = [
        "ball",
        "groundedTeleport",
        "groundPound",
        "fullTeleport",
        "wallJump",
      ];
      const powerSprites = {
        ball: gfx.player.spikeBall,
        groundedTeleport: gfx.props.misc.pwrSym_groundedTeleport,
        groundPound: gfx.props.misc.pwrSym_groundPound,
        fullTeleport: gfx.props.misc.pwrSym_fullTeleport,
        wallJump: gfx.props.misc.pwrSym_wallJump,
      };

      const ref = gfx.player.spikeBall;
      const iconW = ref.w * pixel;
      const iconH = ref.h * pixel;
      const iconGap = Math.round(pixel * 4);
      const totalW =
        powerOrder.length * iconW + (powerOrder.length - 1) * iconGap;
      const hudX0 = Math.round((width - totalW) / 2);
      const hudY = Math.round(height - iconH - pixel * 4);

      powerOrder.forEach((power, i) => {
        const sprite = powerSprites[power];
        if (!sprite) return;

        const ix = hudX0 + i * (iconW + iconGap);
        const flash = engine._hudFlash?.[power] ?? 0;

        ctx.save();
        if (!player.powers[power]) {
          ctx.globalAlpha = 0.22;
        } else if (flash > 0) {
          const scale = 1 + flash * 0.6;
          ctx.translate(ix + iconW / 2, hudY + iconH / 2);
          ctx.scale(scale, scale);
          ctx.translate(-(ix + iconW / 2), -(hudY + iconH / 2));
        }
        sprite.draw(ctx, ix, hudY, pixel);
        ctx.restore();
      });

      //flying-collect animations
      for (const anim of engine._collectAnims ?? []) {
        const sprite = powerSprites[anim.type];
        if (!sprite) continue;

        const idx = powerOrder.indexOf(anim.type);
        const destX = hudX0 + idx * (iconW + iconGap) + iconW / 2;
        const destY = hudY + iconH / 2;

        const p = Math.min(anim.progress / anim.duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        const cx = lerp(anim.startX, destX, ease);
        const cy = lerp(anim.startY, destY, ease);
        const sc = lerp(2.2, 1.0, ease);
        const sw = sprite.w * pixel;
        const sh = sprite.h * pixel;

        ctx.save();
        ctx.globalAlpha = lerp(1, 0.7, ease);
        ctx.translate(cx, cy);
        ctx.scale(sc, sc);
        sprite.draw(ctx, -sw / 2, -sh / 2, pixel);
        ctx.restore();
      }

      ctx.save();
      const bbwidth = effectiveWidth - 200;
      let y = marginY;
      engine.world.iterateRoom(engine.player.room, (obj) => {
        if (obj instanceof MBoss) {
          ctx.fillStyle = "#ffffff";
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.font = "bold 20px Exo"; // PIXEL
          ctx.fillText(obj.name, effectiveWidth / 2, y + 20);
          ctx.fillStyle = "#ff0000";
          ctx.strokeStyle = "black";
          ctx.lineWidth = 4;
          ctx.fillRect(
            100,
            y + 20,
            (bbwidth * Math.max(obj.health, 0)) / obj.maxHealth,
            10,
          );
          ctx.beginPath();
          ctx.roundRect(100, y + 20, bbwidth, 10, 5);
          ctx.stroke();
          y += 50;
        }
      });
      ctx.restore();
    }

    //px per tile
    const MM_CELL = 3;
    //px gap between rooms
    const MM_GAP = 3;

    //canvas display width an height
    const MM_VIEW_W = 180;
    const MM_VIEW_H = 140;

    //CSS junk
    const minimapCanvas = document.createElement("canvas");
    minimapCanvas.id = "minimap";
    minimapCanvas.style.width = MM_VIEW_W + "px";
    minimapCanvas.style.height = MM_VIEW_H + "px";
    minimapCanvas.removeAttribute("width");
    minimapCanvas.removeAttribute("height");
    document.getElementById("overlay").appendChild(minimapCanvas);
    const minimapCtx = minimapCanvas.getContext("2d");

    const minimapLabel = document.createElement("div");
    minimapLabel.id = "minimap-label";
    document.getElementById("overlay").appendChild(minimapLabel);

    //fix the canvas backing store to match display size
    minimapCanvas.width = MM_VIEW_W;
    minimapCanvas.height = MM_VIEW_H;

    //pan offset (user drag, pixels in world-map space)
    let mmPan = {
      x: 0,
      y: 0,
    };
    let mmDragging = false,
      mmDragStartX = 0,
      mmDragStartY = 0,
      mmPanStart = {
        x: 0,
        y: 0,
      };

    minimapCanvas.addEventListener("mousedown", (e) => {
      mmDragging = true;
      mmDragStartX = e.clientX;
      mmDragStartY = e.clientY;
      mmPanStart = { ...mmPan };
      minimapCanvas.classList.add("dragging");
      e.stopPropagation();
    });
    window.addEventListener("mousemove", (e) => {
      if (!mmDragging) return;
      mmPan.x = mmPanStart.x + (e.clientX - mmDragStartX);
      mmPan.y = mmPanStart.y + (e.clientY - mmDragStartY);
    });
    window.addEventListener("mouseup", () => {
      mmDragging = false;
      minimapCanvas.classList.remove("dragging");
    });

    const MM_TILE_COLORS = {
      "#": "#7a8a9a",
      "@": "#2e3d4a",
      B: "#5a6a7a",
      b: "#2a3844",
      "^": "#6a7a5a",
      "=": "#5a5a8a",
    };

    function renderMinimap() {
      const player = engine.player;
      const rooms = engine.world.rooms;
      const nRows = rooms.length;
      if (!nRows || !player) return;

      //build grid dimensions only from non-empty cells
      const nCols = Math.max(...rooms.map((r) => r.length));

      const colW = Array.from({ length: nCols }, (_, ci) =>
        Math.max(0, ...rooms.map((row) => row[ci]?.width ?? 0)),
      );
      const rowH = Array.from({ length: nRows }, (_, ri) =>
        Math.max(0, ...rooms[ri].map((rm) => rm?.height ?? 0)),
      );

      //only add gap where both neighbours have content
      const colX = [];
      let cx = 0;
      for (let ci = 0; ci < nCols; ci++) {
        colX[ci] = cx;
        if (colW[ci] > 0) cx += colW[ci] * MM_CELL + MM_GAP;
      }

      const rowY = [];
      let cy = 0;
      for (let ri = 0; ri < nRows; ri++) {
        rowY[ri] = cy;
        if (rowH[ri] > 0) cy += rowH[ri] * MM_CELL + MM_GAP;
      }

      //find active room's grid position by scanning (don't rely on room.row/col)
      let activeRi = 0,
        activeCi = 0;
      outer: for (let ri = 0; ri < nRows; ri++) {
        for (let ci = 0; ci < (rooms[ri]?.length ?? 0); ci++) {
          if (rooms[ri][ci] === player.room) {
            activeRi = ri;
            activeCi = ci;
            break outer;
          }
        }
      }

      const pr = player.room;
      const followX = colX[activeCi] + ((pr?.width ?? 0) * MM_CELL) / 2;
      const followY = rowY[activeRi] + ((pr?.height ?? 0) * MM_CELL) / 2;
      const camX = followX - MM_VIEW_W / 2 - mmPan.x;
      const camY = followY - MM_VIEW_H / 2 - mmPan.y;

      minimapCtx.clearRect(0, 0, MM_VIEW_W, MM_VIEW_H);
      minimapCtx.fillStyle = "rgba(0, 0, 0, 0.85)";
      minimapCtx.fillRect(0, 0, MM_VIEW_W, MM_VIEW_H);

      const dot = (ox, oy, wx, wy, color) => {
        minimapCtx.fillStyle = color;
        minimapCtx.fillRect(
          ox + Math.round(wx * MM_CELL),
          oy + Math.round(wy * MM_CELL),
          MM_CELL,
          MM_CELL,
        );
      };

      for (let ri = 0; ri < nRows; ri++) {
        for (let ci = 0; ci < (rooms[ri]?.length ?? 0); ci++) {
          const room = rooms[ri][ci];
          if (!room?.bitmap) continue;

          const ox = colX[ci] - camX;
          const oy = rowY[ri] - camY;
          const isActive = room === pr;

          minimapCtx.globalAlpha = isActive ? 1.0 : 0.4;

          for (let r = 0; r < room.bitmap.length; r++) {
            const line = room.bitmap[r];
            for (let c = 0; c < line.length; c++) {
              const color = MM_TILE_COLORS[line[c]];
              if (!color) continue;
              minimapCtx.fillStyle = color;
              minimapCtx.fillRect(
                ox + c * MM_CELL,
                oy + r * MM_CELL,
                MM_CELL,
                MM_CELL,
              );
            }
          }

          minimapCtx.globalAlpha = 1;

          if (isActive) {
            minimapCtx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(
              ox - 1,
              oy - 1,
              room.width * MM_CELL + 2,
              room.height * MM_CELL + 2,
            );

            for (const ent of room.entities) {
              if (ent instanceof MPlayer) continue;
              if (ent instanceof MCheckpoint) {
                dot(ox, oy, ent.x, ent.y, "#00e5ff");
                continue;
              }
              if (ent instanceof MNPC) {
                dot(ox, oy, ent.x, ent.y, "#ffe033");
                continue;
              }
              if (ent instanceof MBreakWall) {
                dot(ox, oy, ent.x, ent.y, "#ff8800");
                continue;
              }
              if (ent instanceof MPowerPillar) {
                dot(ox, oy, ent.x, ent.y, "#cc88ff");
                continue;
              }
              if (ent instanceof MEnemy) {
                dot(
                  ox,
                  oy,
                  ent.x + ent.w / 2 - 0.5,
                  ent.y + ent.h / 2 - 0.5,
                  ent.dead ? "#333" : "#ff3333",
                );
                continue;
              }
            }
            const ball = player.ball;
            if (ball?.room === room) dot(ox, oy, ball.x, ball.y, "#fff");
            dot(ox, oy, player.x, player.y, "#33ff66");
          }

          const key = (worldAssembly[ri]?.[ci] ?? "").trim();
          if (key) {
            minimapCtx.globalAlpha = isActive ? 0.85 : 0.25;
            minimapCtx.fillStyle = "#fff";
            minimapCtx.font = `${MM_CELL * 2}px monospace`;
            minimapCtx.fillText(key, ox + 1, oy + MM_CELL * 2);
            minimapCtx.globalAlpha = 1;
          }
        }
      }

      const key = worldAssembly[activeRi]?.[activeCi] ?? "?";
      minimapLabel.textContent = `[${key}] r${activeRi}c${activeCi}  x:${player.x.toFixed(1)} y:${player.y.toFixed(1)}`;
    }

    let lastTime = performance.now();
    let firstTime = performance.now();
    let frameCount = 0,
      dtMs,
      dt,
      tMs,
      t,
      fps;

    initAudio();
    //a render loop with a timestamp for dt updating
    const render = (timestamp) => {
      switch (scene) {
        case "loading":
          ctx.clearRect(0, 0, width, height);
          ctx.textAlign = "center";
          ctx.textBaseline = "center";
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 50px Exo"; // PIXEL
          ctx.fillText(
            "- loading audio -",
            effectiveWidth / 2,
            (effectiveHeight * 7) / 10 + 10,
          );
          ctx.fillText(
            soundsLoaded + "/5 loaded",
            effectiveWidth / 2,
            (effectiveHeight * 7) / 10 + 80,
          );

          if (loadedSoundtracks) {
            scene = "menu";
          }

          break;
        case "menu":
          ctx.clearRect(0, 0, width, height);
          ctx.drawImage(menui, 0, 0, effectiveWidth, effectiveHeight);
          minimapCanvas.style.display = "none";
          ctx.fillStyle = "rgba(0, 0, 0, 0.01)";
          for (let i = 0; i < 20; i += 2) {
            ctx.fillRect(
              effectiveWidth / 2 - 100 - i,
              (effectiveHeight * 7) / 10 - 35 - i,
              200 + 2 * i,
              70 + 2 * i,
            );
          }
          ctx.textAlign = "center";
          ctx.textBaseline = "center";
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 50px Exo"; // PIXEL
          ctx.fillText(
            "- Play -",
            effectiveWidth / 2,
            (effectiveHeight * 7) / 10 + 10,
          );
          if (events.Mouse) {
            scene = "game";
          }
          break;
        case "thumb":
          ctx.clearRect(0, 0, width, height);
          ctx.drawImage(menui, 0, 0, effectiveWidth, effectiveHeight);
          minimapCanvas.style.display = "none";
          if (events.Mouse) {
            scene = "game";
          }
          break;
        case "game":
          if (events.Backquote && !eventsPrev.Backquote) {
            scene = "thumb";
          }
          minimapCanvas.style.display = "block";
          //prefer the rAF timestamp when present
          const now =
            typeof timestamp === "number" ? timestamp : performance.now();

          //dt in milliseconds, never negative
          dtMs = Math.max(0, now - lastTime);
          tMs = Math.max(0, now - firstTime);

          lastTime = now;

          //dt in seconds (clamped to avoid huge jumps after tab hidden)
          dt = Math.min(dtMs / 1000, 0.1);
          t = tMs / 1000;
          fps = dtMs > 0 ? Math.round(1000 / dtMs) : fps;

          //clear for real this frame
          ctx.fillStyle = "rgb(20, 30, 20)";
          ctx.fillRect(0, 0, width / dprVal, height / dprVal);

          //chrome be tripping yall
          ctx.imageSmoothingEnabled = false;

          shakes.forEach((s, i) => s.active(i));

          if (roomTransition.active) {
            if (!roomTransition.newCaptured) {
              ctx.fillStyle = "rgb(20, 30, 20)";
              ctx.fillRect(0, 0, width / dprVal, height / dprVal);
              ctx.imageSmoothingEnabled = false;
              drawRoomBackground(
                ctx,
                engine.player.room,
                engine.renderer.camera,
              );
              engine.renderer.render(t);
              roomTransition.captureNew(canvas, engine);
              ctx.fillStyle = "rgb(20, 30, 20)";
              ctx.fillRect(0, 0, width, height);
            }

            ctx.save();
            ctx.translate(shake.x, shake.y);
            roomTransition.drawOldRoom(ctx);
            roomTransition.drawNewRoom(ctx);
            ctx.restore();

            engine.renderer._skipRender = true;
            engine.tick(t, 0, {});
            engine.renderer._skipRender = false;
            roomTransition.tick(dt);
          } else {
            ctx.save();
            ctx.translate(shake.x, shake.y);

            const player = engine.player;
            const room = player?.room;
            drawRoomBackground(ctx, room, engine.renderer.camera);

            const preTickYv = engine.player.yv;
            engine.tick(t, dt, events);
            tickSounds(dt, engine.player, preTickYv);

            //hats - nevermore
            //renderPlayerHat(ctx, engine.player, engine.renderer.pixel, engine.renderer.camera);

            //crazy Arrow idea lol
            if (engine.slowMo) {
              const grad = ctx.createRadialGradient(
                width / 2,
                height / 2,
                height * 0.2,
                width / 2,
                height / 2,
                height * 0.85,
              );
              grad.addColorStop(0, "rgba(30, 80, 180, 0)");
              grad.addColorStop(1, "rgba(10, 30, 120, 0.55)");
              ctx.fillStyle = grad;
              ctx.fillRect(0, 0, effectiveWidth, effectiveHeight);
            }

            ctx.restore();
            roomTransition.tick(dt);
            if (!roomTransition.active && engine._pendingUpBoost) {
              engine._pendingUpBoost = false;
              engine.player.yv = -engine.jump;
            }
          }

          //advance collect animations
          if (engine._collectAnims) {
            for (const anim of engine._collectAnims) anim.progress += dt;
            engine._collectAnims = engine._collectAnims.filter(
              (a) => a.progress < a.duration,
            );
          }
          //tick HUD flash timers down
          if (engine._hudFlash) {
            for (const k of Object.keys(engine._hudFlash)) {
              engine._hudFlash[k] = Math.max(0, engine._hudFlash[k] - dt);
            }
          }

          renderHUD(ctx, engine.player, engine.renderer.basePixel, t);

          //minimap
          renderMinimap();

          frameCount++;
          Object.assign(eventsPrev, events);
          break;
      }
    };

    //Replace interval with rAF
    let rafId = null;
    let running = true;

    //pause when tab hidden to avoid wasted frames @Judges
    document.addEventListener("visibilitychange", () => {
      running = !document.hidden;
      if (running && rafId === null) {
        rafId = requestAnimationFrame(loop);
      }
      if (!running && rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    });
    /**
     * main animation loop that requests frames and triggers rendering while the game is running
     * @param {number} now - the current timestamp provided by requestanimationframe
     * @returns {void}
     */
    function loop(now) {
      //if (!debug.freeze) {
      if (!running) {
        rafId = null;
        return;
      }
      render(now);
      rafId = requestAnimationFrame(loop);
      //}
      //console.info(debug.freeze);
    }

    //start
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  </script>
</html>
